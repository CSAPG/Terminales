function initPhotoPV(){
  const canvas = document.getElementById('photo-pv');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // Ciel dégradé
  const sky = ctx.createLinearGradient(0,0,0,H*0.55);
  sky.addColorStop(0,'#0369a1');
  sky.addColorStop(1,'#7dd3fc');
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,W,H*0.55);

  // Soleil
  const sunX = W*0.82, sunY = H*0.18, sunR = 36;
  const sunGrad = ctx.createRadialGradient(sunX,sunY,0,sunX,sunY,sunR*2.5);
  sunGrad.addColorStop(0,'rgba(255,248,180,0.9)');
  sunGrad.addColorStop(0.4,'rgba(255,220,50,0.4)');
  sunGrad.addColorStop(1,'rgba(255,220,50,0)');
  ctx.fillStyle = sunGrad;
  ctx.beginPath(); ctx.arc(sunX,sunY,sunR*2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fffde7';
  ctx.beginPath(); ctx.arc(sunX,sunY,sunR,0,Math.PI*2); ctx.fill();

  // Quelques nuages légers
  function cloud(cx,cy,sc){
    ctx.save(); ctx.globalAlpha=0.55; ctx.fillStyle='#fff';
    ctx.scale(1,0.6);
    [[0,0,30],[28,-12,22],[55,0,28],[-22,-6,20]].forEach(([dx,dy,r])=>{
      ctx.beginPath(); ctx.arc((cx+dx)*1, (cy/0.6+dy)*1, r*sc, 0, Math.PI*2); ctx.fill();
    });
    ctx.restore();
  }
  cloud(120, 60, 0.9); cloud(340, 50, 0.7); cloud(600, 80, 1.1);

  // Sol + herbe
  const ground = ctx.createLinearGradient(0,H*0.55,0,H);
  ground.addColorStop(0,'#4ade80'); ground.addColorStop(0.3,'#22c55e'); ground.addColorStop(1,'#15803d');
  ctx.fillStyle = ground;
  ctx.fillRect(0,H*0.55,W,H*0.45);

  // Ombre portée sous panneau
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(W/2, H*0.78, W*0.38, 18, 0, 0, Math.PI*2); ctx.fill();

  // Cadre panneau PV
  const px=60, py=100, pw=W-120, ph=H*0.45;
  const frameGrad = ctx.createLinearGradient(px,py,px,py+ph);
  frameGrad.addColorStop(0,'#374151'); frameGrad.addColorStop(1,'#111827');
  ctx.fillStyle=frameGrad;
  ctx.beginPath(); ctx.roundRect(px-8,py-8,pw+16,ph+16,6); ctx.fill();

  // Surface panneau — Si monocristallin (bleu foncé brillant)
  const panelGrad = ctx.createLinearGradient(px,py,px+pw,py+ph);
  panelGrad.addColorStop(0,'#1e3a5f'); panelGrad.addColorStop(0.3,'#1a56db');
  panelGrad.addColorStop(0.6,'#1e3a5f'); panelGrad.addColorStop(1,'#0f2847');
  ctx.fillStyle=panelGrad;
  ctx.beginPath(); ctx.roundRect(px,py,pw,ph,3); ctx.fill();

  // Grille de cellules
  const cols=6, rows=4;
  const cw=(pw-10)/cols, ch=(ph-10)/rows;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cx=px+5+c*cw, cy=py+5+r*ch;
      // Cellule avec reflet
      const cellG = ctx.createLinearGradient(cx,cy,cx+cw,cy+ch);
      cellG.addColorStop(0,'rgba(30,90,160,0.9)'); cellG.addColorStop(0.5,'rgba(15,60,120,0.95)');
      cellG.addColorStop(1,'rgba(10,40,90,0.9)');
      ctx.fillStyle=cellG;
      ctx.beginPath(); ctx.roundRect(cx+1,cy+1,cw-2,ch-2,2); ctx.fill();
      // Reflet diagonal
      ctx.fillStyle='rgba(120,180,255,0.08)';
      ctx.beginPath(); ctx.moveTo(cx+1,cy+1); ctx.lineTo(cx+cw*0.5,cy+1); ctx.lineTo(cx+1,cy+ch*0.4); ctx.closePath(); ctx.fill();
      // Lignes contacts (busbars)
      ctx.strokeStyle='rgba(200,220,255,0.25)'; ctx.lineWidth=0.7;
      for(let g=0;g<4;g++){
        ctx.beginPath(); ctx.moveTo(cx+cw*(g+1)/5,cy+2); ctx.lineTo(cx+cw*(g+1)/5,cy+ch-2); ctx.stroke();
      }
    }
  }

  // Connecteurs
  ctx.fillStyle='#6b7280';
  ctx.fillRect(W/2-30,py+ph,60,12);
  ctx.fillRect(W/2-4,py+ph+12,8,25);

  // Rayons lumineux animés (statiques ici)
  for(let i=0;i<8;i++){
    const tx = px + pw*0.1 + pw*0.8*Math.random();
    const ty = py + ph*Math.random();
    ctx.save();
    ctx.globalAlpha=0.08;
    ctx.strokeStyle='#fff9c4'; ctx.lineWidth=20;
    ctx.beginPath(); ctx.moveTo(sunX,sunY); ctx.lineTo(tx,ty); ctx.stroke();
    ctx.restore();
  }

  // Reflet général sur panneau
  const refGrad = ctx.createLinearGradient(px,py,px+pw*0.6,py+ph*0.4);
  refGrad.addColorStop(0,'rgba(255,255,255,0.06)');
  refGrad.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=refGrad;
  ctx.beginPath(); ctx.roundRect(px,py,pw,ph,3); ctx.fill();

  // Label technique
  ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.font='bold 13px sans-serif';
  ctx.fillText('Si monocristallin — 6×4 cellules — η ≈ 22 %', px+12, py+ph-12);
}

/* ══════════════════════════════════════════════
   ANIMATION PHOTONS → MÉTAL (slide 1)
   3 curseurs : λ, nombre de photons, vitesse
   Intérieur métal visible, éjection conditionnelle
══════════════════════════════════════════════ */

// Conversion λ (nm) → RGB
function lamToRGB(lam){
  let r=0,g=0,b=0;
  if(lam<380)      { r=0.5; g=0; b=0.5; }
  else if(lam<440) { r=(440-lam)/60; g=0; b=1; }
  else if(lam<490) { r=0; g=(lam-440)/50; b=1; }
  else if(lam<510) { r=0; g=1; b=(510-lam)/20; }
  else if(lam<580) { r=(lam-510)/70; g=1; b=0; }
  else if(lam<645) { r=1; g=(645-lam)/65; b=0; }
  else if(lam<700) { r=1; g=0; b=0; }
  else             { r=0.7; g=0; b=0; }
  // UV → violet vif pour visibilité
  if(lam<380){ r=0.6; g=0; b=0.8; }
  return {r:Math.round(r*255), g:Math.round(g*255), b:Math.round(b*255)};
}

function lamToCSS(lam){
  const {r,g,b}=lamToRGB(lam);
  return `rgb(${r},${g},${b})`;
}

// hν en eV depuis λ en nm
function lamToHnu(lam){ return 1240/lam; }

function initPhotonAnim(){
  if(photonAnimId) cancelAnimationFrame(photonAnimId);
  photons=[]; photonHits=[];
  photonAnimPaused=false;
  updatePhotonAnim();
  runPhotonAnim();
}

let photonSpawnTimer=0;

function updatePhotonAnim(){
  const lam  = parseInt(document.getElementById('sldr-lam')?.value||500);
  const nph  = parseInt(document.getElementById('sldr-nphot')?.value||6);
  const spd  = parseFloat(document.getElementById('sldr-speed')?.value||2.5);
  const hnu  = lamToHnu(lam);
  const metalKey = document.getElementById('sel-metal-s1')?.value||'zinc';
  const metal = METALS_PE[metalKey]||METALS_PE.zinc;
  const ejection = hnu >= metal.W;

  // Affichages
  const col = lamToCSS(lam);
  const lbox = document.getElementById('lam-color-s');
  if(lbox){ lbox.style.background=col; lbox.style.borderColor=col; }
  const lv = document.getElementById('val-lam-s');
  if(lv) lv.textContent = lam+' nm';
  const hv = document.getElementById('val-hnu-s');
  if(hv) hv.textContent = 'hν = '+hnu.toFixed(2)+' eV';
  const nv = document.getElementById('val-nphot');
  if(nv) nv.textContent = nph+' photon'+(nph>1?'s':'');
  const sv = document.getElementById('val-speed');
  if(sv) sv.textContent = '×'+spd;

  const statusEl = document.getElementById('s1-status');
  if(statusEl){
    statusEl.className='status-badge '+(ejection?'oui':'non');
    statusEl.textContent = ejection
      ? `✓ hν (${hnu.toFixed(2)} eV) ≥ W (${metal.W} eV) → éjection !`
      : `✗ hν (${hnu.toFixed(2)} eV) < W (${metal.W} eV) → pas d'éjection`;
  }
}

function toggleAnim(){
  photonAnimPaused=!photonAnimPaused;
  const btn=document.querySelector('[onclick="toggleAnim()"]');
  if(btn) btn.textContent=photonAnimPaused?'▶ Reprendre':'⏸ Pause';
}

function runPhotonAnim(){
  const canvas = document.getElementById('anim-photons');
  if(!canvas){ photonAnimId=null; return; }
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;

  // ── Zones ──
  // [Soleil | espace | MÉTAL (intérieur) | vide (éjection)]
  const sunX=44, sunY=H/2;
  const metalX=W*0.40, metalW=W*0.42, metalY=14, metalH=H-28;
  const surfX=metalX; // surface gauche du métal (face éclairée)

  // Électrons libres dans le métal (agitation thermique)
  const freeE = Array.from({length:14},(_,i)=>({
    x: metalX+15+Math.random()*(metalW-30),
    y: metalY+10+Math.random()*(metalH-20),
    vx:(Math.random()-0.5)*0.6,
    vy:(Math.random()-0.5)*0.6,
    phase:Math.random()*Math.PI*2
  }));

  function draw(){
    // Lire curseurs en temps réel
    const lam   = parseInt(document.getElementById('sldr-lam')?.value||500);
    const nphot = parseInt(document.getElementById('sldr-nphot')?.value||6);
    const speed = parseFloat(document.getElementById('sldr-speed')?.value||2.5);
    const metalKey = document.getElementById('sel-metal-s1')?.value||'zinc';
    const metal = METALS_PE[metalKey]||METALS_PE.zinc;
    const hnu   = lamToHnu(lam);
    const ejection = hnu >= metal.W;
    const {r,g,b} = lamToRGB(lam);
    const photonCSS = `rgb(${r},${g},${b})`;

    // ── FOND ──
    ctx.fillStyle='#0d1b2a'; ctx.fillRect(0,0,W,H);

    // Étoiles (zone gauche seulement)
    for(let i=0;i<30;i++){
      const sx=(i*137.5)%metalX, sy=(i*89.3+17)%H;
      ctx.fillStyle=`rgba(255,255,255,${0.15+0.3*((i%5)/5)})`;
      ctx.beginPath(); ctx.arc(sx,sy,0.7,0,Math.PI*2); ctx.fill();
    }

    // ── SOLEIL ──
    const sg=ctx.createRadialGradient(sunX,sunY,0,sunX,sunY,40);
    sg.addColorStop(0,'rgba(255,248,180,1)'); sg.addColorStop(0.5,'rgba(255,200,30,0.4)'); sg.addColorStop(1,'transparent');
    ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(sunX,sunY,40,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fffde7'; ctx.beginPath(); ctx.arc(sunX,sunY,16,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,220,80,0.6)'; ctx.font='bold 9px sans-serif'; ctx.textAlign='center';
    ctx.fillText('☀',sunX,sunY+3);

    // ── MÉTAL (intérieur) ──
    const metalColor = metal.color;
    const metalGrad = ctx.createLinearGradient(metalX,0,metalX+metalW,0);
    metalGrad.addColorStop(0,'#1a2535'); metalGrad.addColorStop(0.15,metalColor+'33');
    metalGrad.addColorStop(0.5,metalColor+'22'); metalGrad.addColorStop(1,metalColor+'11');
    ctx.fillStyle=metalGrad;
    ctx.fillRect(metalX,metalY,metalW,metalH);

    // Réseau cristallin (ions +)
    const gCols=7, gRows=5;
    const gsx=metalW/(gCols+0.5), gsy=metalH/(gRows+0.5);
    for(let gc=0;gc<gCols;gc++){
      for(let gr=0;gr<gRows;gr++){
        const ax=metalX+gsx*(gc+0.5), ay=metalY+gsy*(gr+0.5);
        // Liaisons
        ctx.strokeStyle=metalColor+'44'; ctx.lineWidth=0.6;
        if(gc<gCols-1){ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ax+gsx,ay);ctx.stroke();}
        if(gr<gRows-1){ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ax,ay+gsy);ctx.stroke();}
        // Ion
        ctx.fillStyle=metalColor+'cc';
        ctx.beginPath(); ctx.arc(ax,ay,5,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.font='bold 7px sans-serif'; ctx.textAlign='center';
        ctx.fillText('+',ax,ay+2.5);
      }
    }

    // Nom métal + W
    ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center';
    ctx.fillText(metal.name, metalX+metalW/2, metalY+14);
    ctx.font='11px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillText('W = '+metal.W+' eV', metalX+metalW/2, metalY+28);

    // Barre de travail d'extraction (W) sur la surface
    const wBarH = Math.min(metalH*0.75, metal.W*22);
    const wBarY = H/2-wBarH/2;
    ctx.strokeStyle='rgba(239,68,68,0.8)'; ctx.lineWidth=2; ctx.setLineDash([5,3]);
    ctx.beginPath(); ctx.moveTo(metalX+metalW-4,wBarY); ctx.lineTo(metalX+metalW-4,wBarY+wBarH); ctx.stroke();
    ctx.setLineDash([]); ctx.fillStyle='rgba(239,68,68,0.85)'; ctx.font='bold 10px sans-serif'; ctx.textAlign='right';
    ctx.fillText('W='+metal.W+'eV',metalX+metalW-8,H/2+3);

    // ── ÉLECTRONS LIBRES AGITATION THERMIQUE ──
    freeE.forEach(e=>{
      if(!photonAnimPaused){
        e.x+=e.vx; e.y+=e.vy; e.phase+=0.08;
        // rebond sur parois métal
        if(e.x<metalX+8||e.x>metalX+metalW-8) e.vx*=-1;
        if(e.y<metalY+8||e.y>metalY+metalH-8) e.vy*=-1;
        // légère agitation aléatoire
        e.vx+=(Math.random()-0.5)*0.05; e.vy+=(Math.random()-0.5)*0.05;
        e.vx=Math.max(-0.9,Math.min(0.9,e.vx)); e.vy=Math.max(-0.9,Math.min(0.9,e.vy));
      }
      const pulse=0.7+0.3*Math.sin(e.phase);
      ctx.fillStyle=`rgba(59,130,246,${pulse*0.9})`;
      ctx.shadowColor='rgba(59,130,246,0.5)'; ctx.shadowBlur=6;
      ctx.beginPath(); ctx.arc(e.x,e.y,4,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.font='bold 7px sans-serif'; ctx.textAlign='center';
      ctx.fillText('e⁻',e.x,e.y+2.5);
    });

    // Bordure métal (surface éclairée = bord gauche)
    ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=2; ctx.setLineDash([]);
    ctx.strokeRect(metalX,metalY,metalW,metalH);
    // Flèche surface
    ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='10px sans-serif'; ctx.textAlign='center';
    ctx.fillText('▼ surface', metalX+30, metalY+10);

    // ── SPAWN PHOTONS ──
    if(!photonAnimPaused){
      photonSpawnTimer++;
      const spawnInterval = Math.max(3, Math.round(60/nphot));
      if(photonSpawnTimer>=spawnInterval){
        photonSpawnTimer=0;
        const ySpread=metalH*0.7;
        photons.push({
          x: sunX+18,
          y: sunY+(Math.random()-0.5)*ySpread,
          vx: speed*(2+Math.random()*0.5),
          vy: (Math.random()-0.5)*0.6,
          size:3.5+Math.random()*2,
          phase:Math.random()*Math.PI*2,
          lam, hnu,
          // État interne au métal
          inside:false, insideAge:0,
          targetE:null,  // électron cible dans le métal
          absorbed:false
        });
      }
    }

    // ── DÉPLACER & DESSINER PHOTONS ──
    for(let i=photons.length-1;i>=0;i--){
      const p=photons[i];
      if(!photonAnimPaused && !p.inside){
        p.x+=p.vx; p.y+=p.vy;
        p.phase+=0.25;
      }

      // Entrée dans le métal
      if(!p.inside && p.x>=metalX){
        p.inside=true;
        p.insideAge=0;
        // Trouver l'électron libre le plus proche
        let best=null, bestDist=9999;
        freeE.forEach(e=>{
          const d=Math.hypot(e.x-(metalX+50),e.y-p.y);
          if(d<bestDist){bestDist=d;best=e;}
        });
        p.targetE=best;
      }

      if(p.inside){
        if(!photonAnimPaused) p.insideAge++;

        if(!p.absorbed){
          // Photon avance vers l'électron cible
          if(p.targetE){
            const dx=p.targetE.x-p.x, dy=p.targetE.y-p.y;
            const dist=Math.hypot(dx,dy);
            if(!photonAnimPaused && dist>3){
              p.x+=dx/dist*p.vx*0.6;
              p.y+=dy/dist*p.vx*0.6;
            }
            // Collision avec électron cible
            if(dist<10){
              p.absorbed=true;
              // Flash d'absorption
              const ig=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,25);
              ig.addColorStop(0,`rgba(${r},${g},${b},0.9)`);
              ig.addColorStop(1,'transparent');
              ctx.fillStyle=ig; ctx.beginPath(); ctx.arc(p.x,p.y,25,0,Math.PI*2); ctx.fill();

              if(ejection){
                // Éjecter l'électron : lui donner une vélocité vers la droite
                p.targetE.vx = 2+Math.random();
                p.targetE.vy = (Math.random()-0.5)*1.5;
                p.targetE.ejected = true;
                p.targetE.ejectedAge = 0;
                p.targetE.Ec = hnu - metal.W;
              }
              // Supprimer le photon absorbé
              photons.splice(i,1);
              continue;
            }
          } else {
            // Pas de cible, le photon s'éteint
            if(!photonAnimPaused) p.x+=p.vx*0.4;
            if(p.insideAge>40) { photons.splice(i,1); continue; }
          }

          // Dessin photon dans métal (plus petit, atténué)
          const alpha=Math.max(0.2,1-p.insideAge/30);
          ctx.fillStyle=`rgba(${r},${g},${b},${alpha})`;
          ctx.shadowColor=photonCSS; ctx.shadowBlur=8;
          ctx.beginPath(); ctx.arc(p.x,p.y,p.size*0.7,0,Math.PI*2); ctx.fill();
          ctx.shadowBlur=0;
        }
      } else {
        // Photon dans l'espace : boule lumineuse
        // Photon : boule avec halo lumineux — pas de queue
        // Halo externe (aura pulsée)
        const pulse=0.5+0.5*Math.sin(p.phase*2);
        const haloR=p.size*2.8+pulse*4;
        const haloG=ctx.createRadialGradient(p.x,p.y,p.size*0.6,p.x,p.y,haloR);
        haloG.addColorStop(0,`rgba(${r},${g},${b},0.35)`);
        haloG.addColorStop(1,`rgba(${r},${g},${b},0)`);
        ctx.fillStyle=haloG;
        ctx.beginPath(); ctx.arc(p.x,p.y,haloR,0,Math.PI*2); ctx.fill();
        // Corps boule avec dégradé radial
        const ballG=ctx.createRadialGradient(p.x-p.size*0.3,p.y-p.size*0.3,0,p.x,p.y,p.size);
        ballG.addColorStop(0,'rgba(255,255,255,0.95)');
        ballG.addColorStop(0.4,photonCSS);
        ballG.addColorStop(1,`rgba(${r},${g},${b},0.7)`);
        ctx.shadowColor=photonCSS; ctx.shadowBlur=10;
        ctx.fillStyle=ballG;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;
        // Label hν
        ctx.fillStyle='rgba(255,255,255,0.95)'; ctx.font='bold 8px Georgia,serif'; ctx.textAlign='center';
        ctx.fillText('hν',p.x,p.y-p.size-4);

        // Hors espace (gauche)
        if(p.x>metalX+10||p.y<-20||p.y>H+20){ photons.splice(i,1); }
      }
    }

    // ── ÉLECTRONS ÉJECTÉS (sortie droite métal) ──
    freeE.forEach(e=>{
      if(!e.ejected) return;
      if(!photonAnimPaused){ e.ejectedAge++; e.x+=e.vx*1.5; e.y+=e.vy; }
      const alpha=Math.max(0,1-e.ejectedAge/90);
      if(alpha<=0){ e.ejected=false; e.ejectedAge=0; e.vx=(Math.random()-0.5)*0.6; e.vy=(Math.random()-0.5)*0.6;
        // Remettre l'électron dans le métal
        e.x=metalX+15+Math.random()*(metalW-30); e.y=metalY+10+Math.random()*(metalH-20); return; }
      // Traîne éjection
      ctx.fillStyle=`rgba(59,130,246,${alpha*0.3})`;
      ctx.beginPath(); ctx.arc(e.x-e.vx*3,e.y-e.vy*3,4,0,Math.PI*2); ctx.fill();
      // Électron
      ctx.shadowColor='rgba(59,130,246,0.8)'; ctx.shadowBlur=14;
      ctx.fillStyle=`rgba(59,130,246,${alpha})`;
      ctx.beginPath(); ctx.arc(e.x,e.y,6,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle=`rgba(255,255,255,${alpha})`; ctx.font='bold 9px sans-serif'; ctx.textAlign='center';
      ctx.fillText('e⁻',e.x,e.y+3);
      if(e.ejectedAge<30 && e.Ec!==undefined){
        ctx.fillStyle=`rgba(34,197,94,${alpha})`; ctx.font='bold 9px sans-serif';
        ctx.fillText(`Ec=${e.Ec.toFixed(2)} eV`,e.x+22,e.y-6);
      }
    });

    // ── Photons bloqués (rebond sur surface métal si hν < W) ──
    // Ligne de séparation espace/métal
    ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(metalX,metalY); ctx.lineTo(metalX,metalY+metalH); ctx.stroke();
    ctx.setLineDash([]);

    // Info λ/hν flottante
    ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='11px sans-serif'; ctx.textAlign='left';
    const lamV=document.getElementById('sldr-lam')?.value||500;
    ctx.fillText(`λ = ${lamV} nm  |  hν = ${(1240/lamV).toFixed(2)} eV`, 6, H-8);

    photonAnimId=requestAnimationFrame(draw);
  }
  draw();
}

/* ══════════════════════════════════════════════
   COUPLAGE λ ↔ hν (slide 2 fusionné)
══════════════════════════════════════════════ */
function onLamChange(){
  const lam = parseFloat(document.getElementById('sldr-lam')?.value || 620);
  const hnu = +(1240 / lam).toFixed(3);
  const hnuSldr = document.getElementById('sldr-hnu');
  if(hnuSldr){
    // Clamper dans les limites du curseur hν [0.5 – 8.0]
    hnuSldr.value = Math.min(8.0, Math.max(0.5, hnu));
  }
  // Mettre à jour affichage λ
  const col = lamToCSS(lam);
  const lbox = document.getElementById('lam-color-s');
  if(lbox){ lbox.style.background = col; lbox.style.borderColor = col; }
  const lv = document.getElementById('val-lam-s');
  if(lv) lv.textContent = Math.round(lam) + ' nm';
  updateEjectionAnim();
}

function onHnuChange(){
  const hnu = parseFloat(document.getElementById('sldr-hnu')?.value || 2.0);
  const lam = Math.round(1240 / hnu);
  const lamSldr = document.getElementById('sldr-lam');
  if(lamSldr){
    lamSldr.value = Math.min(2500, Math.max(155, lam));
  }
  // Mettre à jour affichage λ
  const col = lamToCSS(lam);
  const lbox = document.getElementById('lam-color-s');
  if(lbox){ lbox.style.background = col; lbox.style.borderColor = col; }
  const lv = document.getElementById('val-lam-s');
  if(lv) lv.textContent = lam + ' nm';
  updateEjectionAnim();
}

/* ══════════════════════════════════════════════
   ANIMATION ÉJECTION FUSIONNÉE (slide 2)
   Source avec N photons colorés + métal + éjection
══════════════════════════════════════════════ */
function initEjectionAnimFused(){
  if(ejectionAnimId) cancelAnimationFrame(ejectionAnimId);
  ejectedElectrons = [];
  s2Photons = []; s2Anchors = []; s2PhotonTimer = 0; s2Paused = false;

  // Initialisation couplée λ → hν au démarrage
  const lamSldr = document.getElementById('sldr-lam');
  const hnuSldr = document.getElementById('sldr-hnu');
  if(lamSldr && hnuSldr){
    const lam = parseFloat(lamSldr.value);
    const hnu = +(1240/lam).toFixed(3);
    hnuSldr.value = Math.min(8.0, Math.max(0.5, hnu));
    const col = lamToCSS(lam);
    const lbox = document.getElementById('lam-color-s');
    if(lbox){ lbox.style.background=col; lbox.style.borderColor=col; }
    const lv = document.getElementById('val-lam-s');
    if(lv) lv.textContent = Math.round(lam)+' nm';
  }

  updateEjectionAnim();

  // Remplacer runEjectionAnim par une version enrichie (N photons en source)
  runEjectionAnimFused();

  const sel = document.getElementById('sel-metal');
  if(sel) updateMetalDesc(sel.value);
}

// Registre des photons visuels côté source (flux coloré)
let fusedSourcePhotons = [];
let fusedSourceTimer = 0;

function runEjectionAnimFused(){
  const canvas = document.getElementById('ejection-canvas');
  if(!canvas){ ejectionAnimId = null; return; }
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const metalKey = document.getElementById('sel-metal')?.value || 'zinc';
  const metal    = METALS_PE[metalKey] || METALS_PE.zinc;
  const hnu      = parseFloat(document.getElementById('sldr-hnu')?.value || 2.0);
  const nPhot    = parseInt(document.getElementById('sldr-nphot')?.value || 6);
  const speed    = parseFloat(document.getElementById('sldr-speed')?.value || 2.0);
  const ejection = hnu >= metal.W;
  const Ec       = ejection ? +(hnu - metal.W).toFixed(3) : 0;
  const lam_nm   = Math.round(1240 / hnu);
  const photonCSS = wavelengthToColor(lam_nm);

  // Décomposer couleur en RGB
  const tmpC = document.createElement('canvas'); tmpC.width=1; tmpC.height=1;
  const tmpX = tmpC.getContext('2d'); tmpX.fillStyle = photonCSS; tmpX.fillRect(0,0,1,1);
  const [pr,pg,pb] = tmpX.getImageData(0,0,1,1).data;

  // ── LAYOUT ──
  const mX   = Math.round(W * 0.35);
  const mW   = Math.round(W * 0.32);
  const mY   = 28, mH = H - 56;
  const srcW = mX - 10;
  const surfX = mX + mW;
  const zoneR = surfX + 40;
  const zoneW = W - zoneR - 10;

  // ── FOND ──
  ctx.fillStyle = '#f8fafc'; ctx.fillRect(0,0,W,H);
  // Zone source teintée couleur photon
  const srcBg = ctx.createLinearGradient(0,0,mX,0);
  srcBg.addColorStop(0,`rgba(${pr},${pg},${pb},0.07)`);
  srcBg.addColorStop(1,`rgba(${pr},${pg},${pb},0.02)`);
  ctx.fillStyle = srcBg; ctx.fillRect(0, 0, mX, H);
  // Zone résultat
  ctx.fillStyle = ejection ? 'rgba(220,252,231,0.45)' : 'rgba(254,226,226,0.4)';
  ctx.beginPath(); ctx.roundRect(zoneR - 4, mY, zoneW + 4, mH, 8); ctx.fill();

  // ── SOURCE : faisceau de N photons ──
  const srcCX = 40, srcCY = H / 2;
  // Halo source
  const sg = ctx.createRadialGradient(srcCX, srcCY, 0, srcCX, srcCY, 40 + nPhot * 1.2);
  sg.addColorStop(0, photonCSS); sg.addColorStop(0.5, `rgba(${pr},${pg},${pb},0.4)`); sg.addColorStop(1,'transparent');
  ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(srcCX, srcCY, 40 + nPhot*1.2, 0, Math.PI*2); ctx.fill();
  // Corps source
  ctx.fillStyle = photonCSS; ctx.beginPath(); ctx.arc(srcCX, srcCY, 14, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'white'; ctx.font = 'bold 9px Georgia,serif'; ctx.textAlign = 'center';
  ctx.fillText('hν', srcCX, srcCY+3);
  ctx.fillStyle = '#d97706'; ctx.font = 'bold 10px Georgia,serif';
  ctx.fillText(hnu.toFixed(2)+' eV', srcCX, srcCY-22);
  ctx.fillStyle = '#6b7280'; ctx.font = '9px sans-serif';
  ctx.fillText('λ≈'+lam_nm+' nm', srcCX, srcCY-10);
  // Badge nombre de photons
  ctx.fillStyle = `rgba(${pr},${pg},${pb},0.85)`; ctx.beginPath();
  ctx.roundRect(srcCX-22, srcCY+18, 44, 18, 6); ctx.fill();
  ctx.fillStyle = 'white'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('N = '+nPhot, srcCX, srcCY+30);

  // ── MÉTAL ──
  const metalGrad = ctx.createLinearGradient(mX,mY,mX+mW,mY);
  metalGrad.addColorStop(0,'#dde3ea');
  metalGrad.addColorStop(0.4, metal.color+'25');
  metalGrad.addColorStop(0.6, metal.color+'18');
  metalGrad.addColorStop(1,'#cbd5e1');
  ctx.fillStyle = metalGrad;
  ctx.beginPath(); ctx.roundRect(mX, mY, mW, mH, 8); ctx.fill();
  ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(mX, mY, mW, mH, 8); ctx.stroke();

  // Réseau cristallin
  const gCols=5, gRows=4;
  const gsx=(mW-16)/(gCols-0.5), gsy=(mH-16)/(gRows-0.5);
  for(let gc=0; gc<gCols; gc++){
    for(let gr=0; gr<gRows; gr++){
      const ax=mX+10+gc*gsx, ay=mY+10+gr*gsy;
      ctx.strokeStyle = metal.color+'55'; ctx.lineWidth=0.6;
      if(gc<gCols-1){ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ax+gsx,ay);ctx.stroke();}
      if(gr<gRows-1){ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ax,ay+gsy);ctx.stroke();}
      ctx.fillStyle = metal.color+'bb';
      ctx.beginPath(); ctx.arc(ax,ay,5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.font='bold 7px sans-serif'; ctx.textAlign='center';
      ctx.fillText('+',ax,ay+2.5);
    }
  }
  ctx.fillStyle='rgba(30,41,59,0.7)'; ctx.font='bold 12px Georgia,serif'; ctx.textAlign='center';
  ctx.fillText(metal.name, mX+mW/2, mY+mH-18);
  ctx.fillStyle='rgba(71,85,105,0.8)'; ctx.font='10px sans-serif';
  ctx.fillText('W = '+metal.W+' eV', mX+mW/2, mY+mH-6);

  // ── Anchors electrons (réutilise s2Anchors) ──
  if(s2Anchors.length === 0){
    for(let ac=0; ac<3; ac++){
      for(let ar=0; ar<3; ar++){
        s2Anchors.push({
          ax: mX + mW*(ac+1)/4, ay: mY + mH*(ar+1)/4,
          hit:false, hitAge:0, willEject:false, ejecting:false, bouncing:false,
          ex:0, ey:0, ejectVx:0, ejectVy:0, ejectX:0, ejectY:0, ejectAlpha:1
        });
      }
    }
  }

  const ecBoost   = ejection ? (1 + 3.0 * Math.sqrt(Math.min(Ec,6)/6)) : 1.0;
  const orbitR    = 10;
  const t0        = Date.now() / 1000;

  s2Anchors.forEach((anch, i) => {
    const phase  = i*2.1 + 0.7, phase2 = i*1.4 + 1.3;
    if(anch.ejecting){
      if(!s2Paused){
        anch.ejectX += anch.ejectVx * speed * 0.5;
        anch.ejectY += anch.ejectVy;
        anch.ejectAlpha = Math.max(0, 1 - (anch.ejectX - surfX)/(W-surfX));
        if(anch.ejectX > W+10){
          anch.ejecting=false; anch.hit=false; anch.hitAge=0;
          anch.ejectX=anch.ax; anch.ejectY=anch.ay; anch.ejectAlpha=1;
        }
      }
      ctx.fillStyle=`rgba(59,130,246,${anch.ejectAlpha*0.25})`;
      ctx.beginPath(); ctx.arc(anch.ejectX-anch.ejectVx*3, anch.ejectY-anch.ejectVy*2, 4, 0, Math.PI*2); ctx.fill();
      ctx.shadowColor='rgba(59,130,246,0.9)'; ctx.shadowBlur=14;
      const eeg=ctx.createRadialGradient(anch.ejectX-2,anch.ejectY-2,0,anch.ejectX,anch.ejectY,7);
      eeg.addColorStop(0,'#ffffff'); eeg.addColorStop(0.4,`rgba(59,130,246,${anch.ejectAlpha})`); eeg.addColorStop(1,`rgba(29,78,216,${anch.ejectAlpha*0.7})`);
      ctx.fillStyle=eeg; ctx.beginPath(); ctx.arc(anch.ejectX,anch.ejectY,7,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle=`rgba(255,255,255,${anch.ejectAlpha})`; ctx.font='bold 8px sans-serif'; ctx.textAlign='center';
      ctx.fillText('e⁻',anch.ejectX,anch.ejectY+3);
      if(anch.ejectAlpha>0.3 && Ec>0){
        ctx.fillStyle=`rgba(34,197,94,${anch.ejectAlpha})`; ctx.font='bold 9px sans-serif';
        ctx.fillText('Ec='+Ec.toFixed(2)+' eV', anch.ejectX+24, anch.ejectY-6);
      }
      return;
    }
    if(anch.bouncing){
      if(!s2Paused){ anch.hitAge++; if(anch.hitAge>30){ anch.bouncing=false; anch.hit=false; anch.hitAge=0; } }
      const shake=Math.sin(anch.hitAge*1.8)*orbitR*1.8*(1-anch.hitAge/30);
      const ex2=anch.ax+shake, ey2=anch.ay+shake*0.4;
      ctx.strokeStyle='rgba(239,68,68,0.5)'; ctx.lineWidth=1.5; ctx.setLineDash([2,3]);
      ctx.beginPath(); ctx.arc(anch.ax,anch.ay,orbitR*1.6,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
      ctx.strokeStyle='rgba(239,68,68,0.4)'; ctx.lineWidth=0.8;
      ctx.beginPath(); ctx.moveTo(anch.ax,anch.ay); ctx.lineTo(ex2,ey2); ctx.stroke();
      ctx.shadowColor='rgba(239,68,68,0.6)'; ctx.shadowBlur=8;
      const eg2=ctx.createRadialGradient(ex2-1.5,ey2-1.5,0,ex2,ey2,5);
      eg2.addColorStop(0,'#fca5a5'); eg2.addColorStop(1,'#dc2626');
      ctx.fillStyle=eg2; ctx.beginPath(); ctx.arc(ex2,ey2,5.5,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle='white'; ctx.font='bold 7px sans-serif'; ctx.textAlign='center';
      ctx.fillText('e⁻',ex2,ey2+2.5);
      return;
    }
    if(!s2Paused && anch.hit){ anch.hitAge++; if(anch.hitAge>15) anch.hit=false; }
    const boost=anch.hit?ecBoost*2.5:ecBoost;
    const ex=anch.ax+orbitR*Math.sin(t0*S2_FREE_E_SPEED*boost*(1+i%3*0.2)+phase);
    const ey=anch.ay+orbitR*Math.cos(t0*S2_FREE_E_SPEED*boost*(0.8+i%3*0.25)+phase2);
    anch.ex=ex; anch.ey=ey;
    const haloR=orbitR*ecBoost*0.7;
    ctx.strokeStyle=anch.hit?'rgba(251,191,36,0.4)':'rgba(59,130,246,0.12)';
    ctx.lineWidth=1; ctx.setLineDash([2,3]);
    ctx.beginPath(); ctx.arc(anch.ax,anch.ay,haloR,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
    ctx.strokeStyle=anch.hit?'rgba(251,191,36,0.6)':'rgba(59,130,246,0.25)'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.moveTo(anch.ax,anch.ay); ctx.lineTo(ex,ey); ctx.stroke();
    if(anch.hit){
      const fa=1-anch.hitAge/15;
      ctx.shadowColor='rgba(251,191,36,0.9)'; ctx.shadowBlur=18*fa;
      const fg=ctx.createRadialGradient(ex-2,ey-2,0,ex,ey,8+4*fa);
      fg.addColorStop(0,'#fef9c3'); fg.addColorStop(0.5,`rgba(251,191,36,${fa})`); fg.addColorStop(1,'transparent');
      ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(ex,ey,8+4*fa,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    }
    const eSize=anch.hit?6.5:4.5;
    ctx.shadowColor='rgba(37,99,235,0.45)'; ctx.shadowBlur=5;
    const eg=ctx.createRadialGradient(ex-1.5,ey-1.5,0,ex,ey,eSize);
    eg.addColorStop(0,'#93c5fd'); eg.addColorStop(1,'#1d4ed8');
    ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(ex,ey,eSize,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    ctx.fillStyle='white'; ctx.font=`bold ${anch.hit?8:7}px sans-serif`; ctx.textAlign='center';
    ctx.fillText('e⁻',ex,ey+2.5);
  });

  // ── Surface & barrière W ──
  ctx.strokeStyle='#ef4444'; ctx.lineWidth=2.5; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(surfX,mY+4); ctx.lineTo(surfX,mY+mH-4); ctx.stroke();
  const wMid=H/2, wScale=Math.min(16,(mH*0.7)/(metal.W+0.5));
  const wTop=wMid-metal.W*wScale/2, wBot=wMid+metal.W*wScale/2;
  ctx.strokeStyle='#ef4444'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(surfX+18,wTop); ctx.lineTo(surfX+18,wBot); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(surfX+13,wTop+5); ctx.lineTo(surfX+18,wTop); ctx.lineTo(surfX+23,wTop+5);
  ctx.moveTo(surfX+13,wBot-5); ctx.lineTo(surfX+18,wBot); ctx.lineTo(surfX+23,wBot-5);
  ctx.stroke();
  ctx.fillStyle='#ef4444'; ctx.font='bold 10px Georgia,serif'; ctx.textAlign='left';
  ctx.fillText('W='+metal.W+' eV', surfX+28, wMid+4);

  // ── Spawn photons depuis source — rythme proportionnel à N ──
  // Intervalle inversement proportionnel à nPhot (plus de photons = plus fréquent)
  const SPAWN_BASE = 120;
  const spawnInterval = Math.max(10, Math.round(SPAWN_BASE / nPhot));
  s2PhotonTimer++;
  if(s2PhotonTimer >= spawnInterval){
    s2PhotonTimer = 0;
    const inFlight = s2Photons.filter(p=>p.state==='travel'||p.state==='impact').length;
    if(inFlight < Math.min(nPhot, 9)){
      const lanes = nPhot<=3 ? [0] : nPhot<=6 ? [-0.22,0,0.22] : [-0.33,-0.11,0.11,0.33];
      const lane = lanes[Math.floor(Math.random()*lanes.length)];
      const targetIdx = Math.floor(Math.random()*9);
      s2Photons.push({
        x: srcCX+16, y: H/2 + lane*mH*0.65,
        vx: S2_PHOTON_VX * speed * 0.5,
        vy: 0, phase: Math.random()*Math.PI*2,
        state:'travel', impactAge:0, bounceVx:0, targetIdx, hitAge:0, hitDone:false
      });
    }
  }

  // ── Déplacer & dessiner photons ──
  if(!s2Paused){
    for(let i=s2Photons.length-1; i>=0; i--){
      const p=s2Photons[i];
      if(p.state==='travel'){
        p.x += p.vx * speed * 0.5; p.phase += 0.12;
        if(p.x>=mX){ p.state='impact'; p.impactAge=0; p.x=mX; }
      } else if(p.state==='impact'){
        const tAnch=s2Anchors[p.targetIdx];
        if(tAnch){
          const dx=tAnch.ax-p.x, dy2=tAnch.ay-p.y, dist=Math.hypot(dx,dy2);
          if(dist>4){ p.x+=dx/dist*S2_PHOTON_VX*0.9; p.y+=dy2/dist*S2_PHOTON_VX*0.9; }
          else if(!p.hitDone){
            p.hitDone=true; p.hitAge=0;
            tAnch.hitAge=0; tAnch.hit=true; tAnch.willEject=ejection;
            if(ejection){
              tAnch.ejecting=true;
              tAnch.ejectVx=S2_PHOTON_VX*(1+3.0*Math.sqrt(Math.min(Ec,6)/6));
              tAnch.ejectVy=(Math.random()-0.5)*1.2;
              tAnch.ejectX=tAnch.ax; tAnch.ejectY=tAnch.ay; tAnch.ejectAlpha=1;
            } else { tAnch.bouncing=true; }
            s2Photons.splice(i,1); continue;
          }
        }
        p.impactAge++;
      } else if(p.state==='rebound'){
        p.x+=p.bounceVx; p.bounceVx*=0.98;
        if(p.x<0){ s2Photons.splice(i,1); continue; }
      }
    }
  }

  for(let i=0; i<s2Photons.length; i++){
    const p=s2Photons[i];
    const pulse=0.5+0.5*Math.sin((p.phase||0)*2);
    if(p.state==='travel'||p.state==='rebound'||p.state==='impact'){
      const r2=6.5+pulse*1.5;
      const haloG=ctx.createRadialGradient(p.x,p.y,r2*0.5,p.x,p.y,r2*2.5);
      haloG.addColorStop(0,`rgba(${pr},${pg},${pb},0.25)`); haloG.addColorStop(1,'transparent');
      ctx.fillStyle=haloG; ctx.beginPath(); ctx.arc(p.x,p.y,r2*2.5,0,Math.PI*2); ctx.fill();
      const ballG=ctx.createRadialGradient(p.x-r2*0.3,p.y-r2*0.35,0,p.x,p.y,r2);
      ballG.addColorStop(0,'rgba(255,255,255,0.95)'); ballG.addColorStop(0.45,photonCSS); ballG.addColorStop(1,`rgba(${pr},${pg},${pb},0.6)`);
      ctx.shadowColor=photonCSS; ctx.shadowBlur=8;
      ctx.fillStyle=ballG; ctx.beginPath(); ctx.arc(p.x,p.y,r2,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
      ctx.fillStyle='rgba(30,30,30,0.85)'; ctx.font='bold 8px Georgia,serif'; ctx.textAlign='center';
      ctx.fillText('hν',p.x,p.y-r2-3);
      if(p.state==='rebound'){
        ctx.fillStyle='#ef4444'; ctx.font='bold 9px sans-serif';
        ctx.fillText('hν < W',p.x,p.y+r2+13);
      }
      if(p.state==='impact'){
        const fa=0.6*(1-p.impactAge/8);
        ctx.fillStyle=`rgba(${pr},${pg},${pb},${fa})`;
        ctx.beginPath(); ctx.arc(mX,p.y,18,0,Math.PI*2); ctx.fill();
      }
    }
  }

  // ── Zone résultat ──
  ctx.fillStyle=ejection?'#166534':'#991b1b';
  ctx.font='bold 12px sans-serif'; ctx.textAlign='center';
  const zMid=zoneR+zoneW/2;
  if(ejection){
    ctx.fillText('⚡ Éjection !', zMid, mY+mH*0.22);
    ctx.font='11px Georgia,serif';
    ctx.fillText('Ec max = hν − W', zMid, mY+mH*0.37);
    ctx.font='bold 13px Georgia,serif'; ctx.fillStyle='#14532d';
    ctx.fillText('= '+Ec.toFixed(2)+' eV', zMid, mY+mH*0.50);
    ctx.font='10px sans-serif'; ctx.fillStyle='#166534';
    ctx.fillText('hν = '+hnu.toFixed(2)+' eV', zMid, mY+mH*0.63);
    ctx.fillText('W  = '+metal.W.toFixed(2)+' eV', zMid, mY+mH*0.74);
    // Rappel intensité
    ctx.fillStyle='rgba(22,101,52,0.6)'; ctx.font='italic 9px sans-serif';
    ctx.fillText('N='+nPhot+' photons : courant ×'+nPhot, zMid, mY+mH*0.87);
  } else {
    ctx.fillText('✗ Aucun effet', zMid, mY+mH*0.28);
    ctx.font='10px sans-serif'; ctx.fillStyle='#7f1d1d';
    ctx.fillText('hν = '+hnu.toFixed(2)+' eV', zMid, mY+mH*0.43);
    ctx.fillText('W  = '+metal.W.toFixed(2)+' eV', zMid, mY+mH*0.55);
    ctx.fillStyle='#991b1b'; ctx.font='bold 10px Georgia,serif';
    ctx.fillText('hν < W', zMid, mY+mH*0.68);
    ctx.fillText('manque '+(metal.W-hnu).toFixed(2)+' eV', zMid, mY+mH*0.78);
    ctx.fillStyle='rgba(153,27,27,0.55)'; ctx.font='italic 9px sans-serif';
    ctx.fillText('N='+nPhot+' photons → 0 électron', zMid, mY+mH*0.89);
  }

  ejectionAnimId = requestAnimationFrame(runEjectionAnimFused);
}


function wavelengthToColor(lam_nm){
  // Conversion longueur d'onde → couleur CSS approximée
  if(lam_nm<380) return '#9400D3';
  if(lam_nm<450) return '#8B00FF';
  if(lam_nm<495) return '#0000FF';
  if(lam_nm<570) return '#00FF00';
  if(lam_nm<590) return '#FFFF00';
  if(lam_nm<620) return '#FF7F00';
  if(lam_nm<750) return '#FF0000';
  return '#AA0000';
}

function initEjectionAnim(){
  if(ejectionAnimId) cancelAnimationFrame(ejectionAnimId);
  ejectedElectrons = [];
  updateEjectionAnim();
  runEjectionAnim();

  // Init desc métal
  const sel = document.getElementById('sel-metal');
  if(sel) updateMetalDesc(sel.value);
}

function updateMetalDesc(key){
  const desc = document.getElementById('metal-desc');
  if(desc && METALS_PE[key]) desc.textContent = METALS_PE[key].desc;
}

let ejectionFrameCount=0;

// Vitesse de déplacement cohérente : photon entrant, électrons internes, électron éjecté
// On définit une BASE_SPEED unique, modulée par Ec pour l'électron éjecté
const S2_PHOTON_VX = 1.8;   // px/frame, volontairement lente et lisible
const S2_FREE_E_SPEED = 0.55; // agitation thermique proportionnelle

function runEjectionAnim(){
  const canvas = document.getElementById('ejection-canvas');
  if(!canvas){ ejectionAnimId=null; return; }
  const ctx = canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  ejectionFrameCount++;

  const metalKey = document.getElementById('sel-metal')?.value||'zinc';
  const metal = METALS_PE[metalKey]||METALS_PE.zinc;
  const hnu = parseFloat(document.getElementById('sldr-hnu')?.value||2.0);
  const ejection = hnu >= metal.W;
  const Ec = ejection ? +(hnu-metal.W).toFixed(3) : 0;
  const lam_nm = Math.round(1240/hnu);
  const photonCSS = wavelengthToColor(lam_nm);
  // Décomposer la couleur CSS en RGB pour transparence
  const tmpC=document.createElement('canvas'); tmpC.width=1; tmpC.height=1;
  const tmpX=tmpC.getContext('2d'); tmpX.fillStyle=photonCSS; tmpX.fillRect(0,0,1,1);
  const [pr,pg,pb]=tmpX.getImageData(0,0,1,1).data;

  // ── LAYOUT ──
  const mX=Math.round(W*0.30), mW=Math.round(W*0.36), mY=28, mH=H-56;
  const srcX=38, srcY=H/2;
  const surfX=mX+mW;
  const zoneR=surfX+46, zoneW=W-surfX-50;

  // ── FOND ──
  ctx.fillStyle='#f8fafc'; ctx.fillRect(0,0,W,H);
  // Teinte zone source
  ctx.fillStyle='rgba(254,243,199,0.3)'; ctx.fillRect(0,0,mX,H);
  // Teinte zone résultat
  ctx.fillStyle=ejection?'rgba(220,252,231,0.45)':'rgba(254,226,226,0.4)';
  ctx.beginPath(); ctx.roundRect(zoneR-4,mY,zoneW+4,mH,8); ctx.fill();

  // ── SOURCE ──
  const sg=ctx.createRadialGradient(srcX,srcY,0,srcX,srcY,32);
  sg.addColorStop(0,photonCSS); sg.addColorStop(0.5,`rgba(${pr},${pg},${pb},0.5)`); sg.addColorStop(1,'transparent');
  ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(srcX,srcY,32,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=photonCSS; ctx.beginPath(); ctx.arc(srcX,srcY,12,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white'; ctx.font='bold 9px Georgia,serif'; ctx.textAlign='center';
  ctx.fillText('hν',srcX,srcY+3);
  ctx.fillStyle='#374151'; ctx.font='10px sans-serif';
  ctx.fillText('Source',srcX,srcY+26);
  ctx.fillStyle='#d97706'; ctx.font='bold 10px Georgia,serif';
  ctx.fillText(hnu.toFixed(2)+' eV', srcX, srcY-22);
  ctx.fillStyle='#6b7280'; ctx.font='9px sans-serif';
  ctx.fillText('λ≈'+lam_nm+' nm', srcX, srcY-10);

  // ── MÉTAL ──
  const metalGrad=ctx.createLinearGradient(mX,mY,mX+mW,mY);
  metalGrad.addColorStop(0,'#dde3ea'); metalGrad.addColorStop(0.4,metal.color+'25');
  metalGrad.addColorStop(0.6,metal.color+'18'); metalGrad.addColorStop(1,'#cbd5e1');
  ctx.fillStyle=metalGrad;
  ctx.beginPath(); ctx.roundRect(mX,mY,mW,mH,8); ctx.fill();
  ctx.strokeStyle='#94a3b8'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(mX,mY,mW,mH,8); ctx.stroke();

  // Réseau cristallin
  const gCols=5, gRows=4;
  const gsx=(mW-16)/(gCols-0.5), gsy=(mH-16)/(gRows-0.5);
  for(let gc=0;gc<gCols;gc++){
    for(let gr=0;gr<gRows;gr++){
      const ax=mX+10+gc*gsx, ay=mY+10+gr*gsy;
      ctx.strokeStyle=metal.color+'55'; ctx.lineWidth=0.6;
      if(gc<gCols-1){ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ax+gsx,ay);ctx.stroke();}
      if(gr<gRows-1){ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ax,ay+gsy);ctx.stroke();}
      ctx.fillStyle=metal.color+'bb';
      ctx.beginPath(); ctx.arc(ax,ay,5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.font='bold 7px sans-serif'; ctx.textAlign='center';
      ctx.fillText('+',ax,ay+2.5);
    }
  }

  // ── Initialiser s2Anchors si vide (positions fixes dans le réseau 3×3) ──
  if(s2Anchors.length === 0){
    for(let ac=0; ac<3; ac++){
      for(let ar=0; ar<3; ar++){
        s2Anchors.push({
          ax: mX + mW*(ac+1)/4,
          ay: mY + mH*(ar+1)/4,
          hit: false, hitAge: 0, willEject: false,
          ejecting: false, bouncing: false,
          ex: 0, ey: 0,   // position courante (calculée chaque frame)
          ejectVx: 0, ejectVy: 0,
          ejectX: 0, ejectY: 0,  // position pendant l'éjection
          ejectAlpha: 1,
        });
      }
    }
  }

  const ecBoost = ejection ? (1 + 3.0 * Math.sqrt(Math.min(Ec, 6) / 6)) : 1.0;
  const orbitRadius = 10; // px — rayon max d'oscillation locale
  const t0 = Date.now() / 1000;

  s2Anchors.forEach((anch, i) => {
    const phase  = i * 2.1 + 0.7;
    const phase2 = i * 1.4 + 1.3;

    if(anch.ejecting){
      // ── L'électron s'est décroché et file vers la surface droite ──
      if(!s2Paused){
        anch.ejectX += anch.ejectVx;
        anch.ejectY += anch.ejectVy;
        anch.ejectAlpha = Math.max(0, 1 - (anch.ejectX - surfX) / (W - surfX));
        if(anch.ejectX > W + 10){
          // Réinitialiser l'ancre après éjection
          anch.ejecting = false; anch.hit = false; anch.hitAge = 0;
          anch.ejectX = anch.ax; anch.ejectY = anch.ay; anch.ejectAlpha = 1;
        }
      }
      // Traîne
      ctx.fillStyle = `rgba(59,130,246,${anch.ejectAlpha*0.25})`;
      ctx.beginPath(); ctx.arc(anch.ejectX - anch.ejectVx*3, anch.ejectY - anch.ejectVy*2, 4, 0, Math.PI*2); ctx.fill();
      // Électron éjecté (bleu vif)
      ctx.shadowColor = 'rgba(59,130,246,0.9)'; ctx.shadowBlur = 14;
      const eeg = ctx.createRadialGradient(anch.ejectX-2, anch.ejectY-2, 0, anch.ejectX, anch.ejectY, 7);
      eeg.addColorStop(0,'#ffffff'); eeg.addColorStop(0.4,`rgba(59,130,246,${anch.ejectAlpha})`); eeg.addColorStop(1,`rgba(29,78,216,${anch.ejectAlpha*0.7})`);
      ctx.fillStyle = eeg;
      ctx.beginPath(); ctx.arc(anch.ejectX, anch.ejectY, 7, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = `rgba(255,255,255,${anch.ejectAlpha})`; ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('e⁻', anch.ejectX, anch.ejectY+3);
      return; // ne pas dessiner l'ancre pendant l'éjection
    }

    if(anch.bouncing){
      // ── Pas d'éjection : l'électron vibre fort puis revient ──
      if(!s2Paused){ anch.hitAge++; if(anch.hitAge > 30){ anch.bouncing=false; anch.hit=false; anch.hitAge=0; } }
      const shake = Math.sin(anch.hitAge * 1.8) * (orbitRadius * 1.8) * (1 - anch.hitAge/30);
      const ex2 = anch.ax + shake;
      const ey2 = anch.ay + shake * 0.4;
      // Cercle rouge = énergie insuffisante
      ctx.strokeStyle = 'rgba(239,68,68,0.5)'; ctx.lineWidth = 1.5; ctx.setLineDash([2,3]);
      ctx.beginPath(); ctx.arc(anch.ax, anch.ay, orbitRadius*1.6, 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
      ctx.strokeStyle='rgba(239,68,68,0.4)'; ctx.lineWidth=0.8;
      ctx.beginPath(); ctx.moveTo(anch.ax,anch.ay); ctx.lineTo(ex2,ey2); ctx.stroke();
      ctx.shadowColor='rgba(239,68,68,0.6)'; ctx.shadowBlur=8;
      const eg2=ctx.createRadialGradient(ex2-1.5,ey2-1.5,0,ex2,ey2,5);
      eg2.addColorStop(0,'#fca5a5'); eg2.addColorStop(1,'#dc2626');
      ctx.fillStyle=eg2; ctx.beginPath(); ctx.arc(ex2,ey2,5.5,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle='white'; ctx.font='bold 7px sans-serif'; ctx.textAlign='center';
      ctx.fillText('e⁻',ex2,ey2+2.5);
      return;
    }

    // ── État normal : oscillation locale autour de l'ancre ──
    if(!s2Paused && anch.hit){ anch.hitAge++; if(anch.hitAge>15) anch.hit=false; }
    const boost = anch.hit ? ecBoost * 2.5 : ecBoost; // surbrillance au moment de l'impact
    const ex = anch.ax + orbitRadius * Math.sin(t0 * S2_FREE_E_SPEED * boost * (1+i%3*0.2) + phase);
    const ey = anch.ay + orbitRadius * Math.cos(t0 * S2_FREE_E_SPEED * boost * (0.8+i%3*0.25) + phase2);
    anch.ex = ex; anch.ey = ey;

    // Halo orbital (plus grand avec ecBoost)
    const haloR = orbitRadius * ecBoost * 0.7;
    ctx.strokeStyle = anch.hit ? 'rgba(251,191,36,0.4)' : 'rgba(59,130,246,0.12)';
    ctx.lineWidth = 1; ctx.setLineDash([2,3]);
    ctx.beginPath(); ctx.arc(anch.ax, anch.ay, haloR, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    // Trait ancre → électron
    ctx.strokeStyle = anch.hit ? 'rgba(251,191,36,0.6)' : 'rgba(59,130,246,0.25)';
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(anch.ax,anch.ay); ctx.lineTo(ex,ey); ctx.stroke();

    // Flash jaune si impact en cours
    if(anch.hit){
      const fa = 1 - anch.hitAge/15;
      ctx.shadowColor='rgba(251,191,36,0.9)'; ctx.shadowBlur=18*fa;
      const fg=ctx.createRadialGradient(ex-2,ey-2,0,ex,ey,8+4*fa);
      fg.addColorStop(0,'#fef9c3'); fg.addColorStop(0.5,`rgba(251,191,36,${fa})`); fg.addColorStop(1,'transparent');
      ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(ex,ey,8+4*fa,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    }

    // Électron normal
    const eSize = anch.hit ? 6.5 : 4.5;
    ctx.shadowColor='rgba(37,99,235,0.45)'; ctx.shadowBlur=5;
    const eg=ctx.createRadialGradient(ex-1.5,ey-1.5,0,ex,ey,eSize);
    eg.addColorStop(0,'#93c5fd'); eg.addColorStop(1,'#1d4ed8');
    ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(ex,ey,eSize,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='white'; ctx.font=`bold ${anch.hit?8:7}px sans-serif`; ctx.textAlign='center';
    ctx.fillText('e⁻',ex,ey+2.5);
  });

  // Nom métal + W (en bas du métal pour ne pas gêner)
  ctx.fillStyle='rgba(30,41,59,0.7)'; ctx.font='bold 12px Georgia,serif'; ctx.textAlign='center';
  ctx.fillText(metal.name, mX+mW/2, mY+mH-18);
  ctx.fillStyle='rgba(71,85,105,0.8)'; ctx.font='10px sans-serif';
  ctx.fillText('W = '+metal.W+' eV', mX+mW/2, mY+mH-6);

  // ── SURFACE & BARRIÈRE W ──
  ctx.strokeStyle='#ef4444'; ctx.lineWidth=2.5; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(surfX,mY+4); ctx.lineTo(surfX,mY+mH-4); ctx.stroke();
  // Double flèche W centrée sur la surface
  const wMid=H/2, wScale=Math.min(16, (mH*0.7)/(metal.W+0.5));
  const wTop=wMid-metal.W*wScale/2, wBot=wMid+metal.W*wScale/2;
  ctx.strokeStyle='#ef4444'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(surfX+18,wTop); ctx.lineTo(surfX+18,wBot); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(surfX+13,wTop+5); ctx.lineTo(surfX+18,wTop); ctx.lineTo(surfX+23,wTop+5);
  ctx.moveTo(surfX+13,wBot-5); ctx.lineTo(surfX+18,wBot); ctx.lineTo(surfX+23,wBot-5);
  ctx.stroke();
  ctx.fillStyle='#ef4444'; ctx.font='bold 10px Georgia,serif'; ctx.textAlign='left';
  ctx.fillText('W='+metal.W+' eV', surfX+28, wMid+4);

  // ── SPAWN photons — max 3, un par lane centrale ──
  // On utilise 3 lanes espacées
  s2PhotonTimer++;
  const SPAWN_INTERVAL=55; // frames entre chaque vague → rythme lent
  if(s2PhotonTimer>=SPAWN_INTERVAL){
    s2PhotonTimer=0;
    // Compter photons en vol (state travel/rebound) pour ne pas dépasser 3
    const inFlight=s2Photons.filter(p=>p.state==='travel'||p.state==='rebound').length;
    if(inFlight<3){
      const lanes=[-0.28, 0, 0.28]; // 3 trajectoires seulement
      lanes.forEach((dy)=>{
        // Choisir aléatoirement un ancrage cible dans le métal
        const targetIdx = Math.floor(Math.random()*9);
        s2Photons.push({
          x: srcX+14,
          y: H/2+dy*mH*0.7,
          vx: S2_PHOTON_VX,
          vy: 0,
          phase: Math.random()*Math.PI*2,
          state:'travel',
          impactAge:0,
          bounceVx:0,
          targetIdx,        // indice de l'électron ancré ciblé
          hitAge: 0,        // durée depuis le hit sur l'électron cible
          hitDone: false    // le flash a eu lieu
        });
      });
    }
  }

  // ── DÉPLACER & DESSINER photons ──
  if(!s2Paused){
    for(let i=s2Photons.length-1;i>=0;i--){
      const p=s2Photons[i];
      if(p.state==='travel'){
        p.x+=p.vx; p.phase+=0.12;
        if(p.x>=mX){ p.state='impact'; p.impactAge=0; p.x=mX; }
      } else if(p.state==='impact'){
        // Le photon pénètre dans le métal et se dirige vers l'électron cible
        const tAnch = s2Anchors[p.targetIdx];
        if(tAnch){
          const dx = tAnch.ax - p.x, dy2 = tAnch.ay - p.y;
          const dist = Math.hypot(dx, dy2);
          if(dist > 4){
            p.x += dx/dist * S2_PHOTON_VX * 0.9;
            p.y += dy2/dist * S2_PHOTON_VX * 0.9;
          } else if(!p.hitDone){
            // Contact avec l'électron cible → flash + décision éjection/rebond
            p.hitDone = true;
            p.hitAge = 0;
            tAnch.hitAge = 0;         // déclenche le flash sur l'électron
            tAnch.hit = true;
            tAnch.willEject = ejection;
            if(ejection){
              tAnch.ejecting = true;
              tAnch.ejectVx = S2_PHOTON_VX*(1 + 3.0*Math.sqrt(Math.min(Ec,6)/6));
              tAnch.ejectVy = (Math.random()-0.5)*1.2;
              tAnch.ejectX = tAnch.ax;  // part de la position courante
              tAnch.ejectY = tAnch.ay;
              tAnch.ejectAlpha = 1;
            } else {
              tAnch.bouncing = true;
            }
            // Supprimer le photon absorbé
            s2Photons.splice(i,1); continue;
          }
        }
        p.impactAge++;
      } else if(p.state==='rebound'){
        p.x+=p.bounceVx; p.bounceVx*=0.98;
        if(p.x<0){ s2Photons.splice(i,1); continue; }
      } else if(p.state==='eject'){
        p.x+=p.ejectVx; p.y+=p.ejectVy;
        if(p.x>W+20||p.y<-20||p.y>H+20){ s2Photons.splice(i,1); continue; }
      }
    }
  }

  // Dessin de tous les photons
  for(let i=0;i<s2Photons.length;i++){
    const p=s2Photons[i];
    const pulse=0.5+0.5*Math.sin((p.phase||0)*2);

    if(p.state==='travel'||p.state==='rebound'||p.state==='impact'){
      // ── Boule photon (pas de queue) ──
      const r2=6.5+pulse*1.5;
      const haloG=ctx.createRadialGradient(p.x,p.y,r2*0.5,p.x,p.y,r2*2.5);
      haloG.addColorStop(0,`rgba(${pr},${pg},${pb},0.25)`); haloG.addColorStop(1,'transparent');
      ctx.fillStyle=haloG; ctx.beginPath(); ctx.arc(p.x,p.y,r2*2.5,0,Math.PI*2); ctx.fill();
      const ballG=ctx.createRadialGradient(p.x-r2*0.3,p.y-r2*0.35,0,p.x,p.y,r2);
      ballG.addColorStop(0,'rgba(255,255,255,0.95)'); ballG.addColorStop(0.45,photonCSS); ballG.addColorStop(1,`rgba(${pr},${pg},${pb},0.6)`);
      ctx.shadowColor=photonCSS; ctx.shadowBlur=8;
      ctx.fillStyle=ballG; ctx.beginPath(); ctx.arc(p.x,p.y,r2,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle='rgba(30,30,30,0.85)'; ctx.font='bold 8px Georgia,serif'; ctx.textAlign='center';
      ctx.fillText('hν',p.x,p.y-r2-3);

      // Annotation rebond
      if(p.state==='rebound'){
        ctx.fillStyle='#ef4444'; ctx.font='bold 9px sans-serif'; ctx.textAlign='center';
        ctx.fillText('hν < W',p.x,p.y+r2+13);
      }
      // Flash impact (impactAge 1-7)
      if(p.state==='impact'){
        const fa=0.6*(1-p.impactAge/8);
        ctx.fillStyle=`rgba(${pr},${pg},${pb},${fa})`;
        ctx.beginPath(); ctx.arc(mX,p.y,18,0,Math.PI*2); ctx.fill();
      }

    }
    // Note : l'état 'eject' est maintenant géré directement par s2Anchors (voir bloc anchors ci-dessous)
  }

  // ── Zone résultat (droite) — toujours visible ──
  ctx.fillStyle=ejection?'#166534':'#991b1b';
  ctx.font='bold 12px sans-serif'; ctx.textAlign='center';
  const zMid=zoneR+zoneW/2;
  if(ejection){
    ctx.fillText('⚡ Éjection !', zMid, mY+mH*0.28);
    ctx.font='11px Georgia,serif';
    ctx.fillText('Ec max = hν − W', zMid, mY+mH*0.44);
    ctx.font='bold 13px Georgia,serif'; ctx.fillStyle='#14532d';
    ctx.fillText('= '+Ec.toFixed(2)+' eV', zMid, mY+mH*0.57);
    ctx.font='10px sans-serif'; ctx.fillStyle='#166534';
    ctx.fillText('hν = '+hnu.toFixed(2)+' eV', zMid, mY+mH*0.70);
    ctx.fillText('W  = '+metal.W.toFixed(2)+' eV', zMid, mY+mH*0.82);
  } else {
    ctx.fillText('✗ Aucun effet', zMid, mY+mH*0.35);
    ctx.font='10px sans-serif'; ctx.fillStyle='#7f1d1d';
    ctx.fillText('hν = '+hnu.toFixed(2)+' eV', zMid, mY+mH*0.50);
    ctx.fillText('W  = '+metal.W.toFixed(2)+' eV', zMid, mY+mH*0.62);
    ctx.fillStyle='#991b1b'; ctx.font='bold 10px Georgia,serif';
    ctx.fillText('hν < W', zMid, mY+mH*0.76);
    ctx.fillText('→ manque '+(metal.W-hnu).toFixed(2)+' eV', zMid, mY+mH*0.87);
  }

  ejectionAnimId = requestAnimationFrame(runEjectionAnim);
}

function updateEjectionAnim(){
  const metalKey = document.getElementById('sel-metal')?.value||'zinc';
  const metal = METALS_PE[metalKey]||METALS_PE.zinc;
  const hnu = parseFloat(document.getElementById('sldr-hnu')?.value||2.0);
  const h=6.626e-34, eV=1.6e-19, c=3e8;
  const ejection = hnu >= metal.W;

  // hν valeur
  if(document.getElementById('val-hnu')) document.getElementById('val-hnu').textContent = hnu.toFixed(2)+' eV';

  // hν vs W
  const hnuVsW = document.getElementById('hnu-vs-W');
  if(hnuVsW){
    if(ejection){
      hnuVsW.style.color='#166534';
      hnuVsW.textContent = `≥ W (${metal.W} eV)  →  Ec = ${(hnu-metal.W).toFixed(2)} eV`;
    } else {
      hnuVsW.style.color='#B91C1C';
      hnuVsW.textContent = `< W (${metal.W} eV)  →  aucun effet`;
    }
  }

  // ν calculée
  const nu = hnu*eV/h;
  const nu0 = metal.W*eV/h;
  if(document.getElementById('val-nu')) document.getElementById('val-nu').textContent = (nu/1e14).toFixed(2)+' × 10¹⁴ Hz';

  // ν vs ν₀
  const nuVsNu0 = document.getElementById('nu-vs-nu0');
  if(nuVsNu0){
    const nu0str = (nu0/1e14).toFixed(2)+' × 10¹⁴ Hz';
    if(ejection){
      nuVsNu0.style.color='#166534';
      nuVsNu0.textContent = `≥ ν₀ = ${nu0str}`;
    } else {
      nuVsNu0.style.color='#B91C1C';
      nuVsNu0.textContent = `< ν₀ = ${nu0str}`;
    }
  }

  // λ — met à jour le badge fusionné (slide 2) et les anciens IDs si présents
  const lam = Math.round(c/nu*1e9);
  const lamStr = lam+' nm';
  if(document.getElementById('val-lam'))   document.getElementById('val-lam').textContent = lamStr;
  if(document.getElementById('val-lam-s')) document.getElementById('val-lam-s').textContent = lamStr;
  const colorBox  = document.getElementById('lam-color-box');
  const colorBoxS = document.getElementById('lam-color-s');
  const col = wavelengthToColor(lam);
  if(colorBox)  colorBox.style.background  = col;
  if(colorBoxS){ colorBoxS.style.background = col; colorBoxS.style.borderColor = col; }
  // Synchroniser sldr-lam sur sldr-hnu si présent
  const lamSldr = document.getElementById('sldr-lam');
  if(lamSldr) lamSldr.value = Math.min(2500, Math.max(155, lam));

  // Badge résultat
  const Ec = ejection ? (hnu-metal.W).toFixed(3) : null;
  const statusEl = document.getElementById('ejection-status');
  if(statusEl){
    statusEl.className = 'status-badge '+(ejection?'oui':'non');
    statusEl.textContent = ejection ? '✓ Effet photoélectrique !' : '✗ Pas d\'effet photoélectrique';
  }
  const ecEl = document.getElementById('ejection-ec');
  if(ecEl) ecEl.textContent = ''; // Ec affiché uniquement dans la zone résultat du canvas

  updateMetalDesc(metalKey);
  // Vider photons ET réinitialiser les ancres au changement de métal/curseur
  s2Photons=[];
  s2Anchors=[];
}

/* ══════════════════════════════════════════════
   MATÉRIAUX PV — SPECTRE
══════════════════════════════════════════════ */
function selectMat(id){
  // Mise à jour cartes
  MATS_PV.forEach(m=>{
    const el=document.getElementById('mc-'+m.id);
    if(el) el.classList.toggle('selected', m.id===id);
  });
  const mat = MATS_PV.find(m=>m.id===id);
  if(!mat) return;

  // Description
  const desc = document.getElementById('mat-desc-box');
  if(desc){
    desc.className='info-box bleu';
    desc.innerHTML=`<b>${mat.icon} ${mat.name}</b> — Eg = <b>${mat.Eg} eV</b> — Rendement : <b>${mat.eff}</b> — λmax ≈ <b>${mat.lmax} nm</b><br>${mat.desc}`;
  }

  // Spectre
  drawSpectrum(mat);
}

function drawSpectrum(mat){
  const canvas = document.getElementById('mat-spectrum');
  if(!canvas) return;
  const ctx=canvas.getContext('2d'), W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#f8fafc'; ctx.fillRect(0,0,W,H);

  const padL=72,padR=40,padT=48,padB=50;
  const gW=W-padL-padR, gH=H-padT-padB;
  const lMin=300, lMax=1200;

  // Titre du graphique
  ctx.fillStyle='#1B4F8A'; ctx.font='bold 13px Georgia,serif'; ctx.textAlign='center';
  ctx.fillText('Spectre solaire et zone d\'absorption du matériau sélectionné', W/2, 18);

  // Spectre solaire (approximation corps noir 5778K + atmosphère)
  function solarIrrad(lam){ // W/m²/nm approximé
    const x=(lam-300)/900;
    const gauss1=1000*Math.exp(-Math.pow((lam-490)/200,2));
    const ir=lam>700?800*Math.exp(-Math.pow((lam-900)/400,2)):0;
    const uv=lam<450?300*Math.exp(-Math.pow((lam-380)/80,2)):0;
    return Math.max(0,gauss1+ir+uv)*1.1;
  }

  // Fond spectre visible (couleurs)
  for(let lam=380;lam<=750;lam++){
    const x=padL+(lam-lMin)/(lMax-lMin)*gW;
    const col=wavelengthToColor(lam);
    ctx.fillStyle=col; ctx.globalAlpha=0.18;
    ctx.fillRect(x,padT,1,gH);
  }
  ctx.globalAlpha=1;

  // Courbe spectre solaire
  ctx.beginPath(); ctx.strokeStyle='#F59E0B'; ctx.lineWidth=2.5;
  for(let lam=lMin;lam<=lMax;lam+=5){
    const x=padL+(lam-lMin)/(lMax-lMin)*gW;
    const irr=solarIrrad(lam);
    const y=padT+gH-irr/1200*gH;
    lam===lMin?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();

  // Annotation : baisse à ~700 nm
  {
    const xAnnot = padL+(700-lMin)/(lMax-lMin)*gW;
    const irr700 = solarIrrad(700);
    const yAnnot = padT+gH-irr700/1200*gH;
    ctx.strokeStyle='#6B7280'; ctx.lineWidth=1.2; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(xAnnot,padT+gH); ctx.lineTo(xAnnot,yAnnot); ctx.stroke();
    ctx.setLineDash([]);
    // Encadré annotation
    const bw=170, bh=40, bx=xAnnot+6, by=padT+gH*0.18;
    ctx.fillStyle='rgba(255,255,255,0.93)'; ctx.strokeStyle='#9CA3AF'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,6); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#374151'; ctx.font='bold 10px sans-serif'; ctx.textAlign='left';
    ctx.fillText('⬇ Fin du visible (≈700 nm)',bx+6,by+14);
    ctx.font='10px sans-serif'; ctx.fillStyle='#6B7280';
    ctx.fillText('Début IR : absorption atmosphérique',bx+6,by+30);
  }

  // Zone absorbée par le matériau (remplie)
  ctx.beginPath();
  let first=true;
  for(let lam=lMin;lam<=Math.min(mat.lmax,lMax);lam+=5){
    const x=padL+(lam-lMin)/(lMax-lMin)*gW;
    const irr=solarIrrad(lam);
    const y=padT+gH-irr/1200*gH;
    if(first){ctx.moveTo(x,padT+gH); ctx.lineTo(x,y); first=false;}
    else ctx.lineTo(x,y);
  }
  const xLmax=padL+(Math.min(mat.lmax,lMax)-lMin)/(lMax-lMin)*gW;
  ctx.lineTo(xLmax,padT+gH); ctx.closePath();
  ctx.fillStyle=mat.color+'55'; ctx.fill();
  ctx.strokeStyle=mat.color; ctx.lineWidth=2;
  ctx.beginPath();
  first=true;
  for(let lam=lMin;lam<=Math.min(mat.lmax,lMax);lam+=5){
    const x=padL+(lam-lMin)/(lMax-lMin)*gW;
    const irr=solarIrrad(lam);
    const y=padT+gH-irr/1200*gH;
    if(first){ctx.moveTo(x,y);first=false;}else ctx.lineTo(x,y);
  }
  ctx.stroke();

  // Ligne λmax
  ctx.strokeStyle=mat.color; ctx.lineWidth=2; ctx.setLineDash([6,3]);
  const xCut=padL+(mat.lmax-lMin)/(lMax-lMin)*gW;
  ctx.beginPath(); ctx.moveTo(xCut,padT); ctx.lineTo(xCut,padT+gH); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=mat.color; ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
  ctx.fillText('λmax = '+mat.lmax+' nm',xCut,padT-5);

  // Axes fléchés
  ctx.strokeStyle='#374151'; ctx.lineWidth=1.5;
  // Axe X (lambda) avec flèche
  ctx.beginPath(); ctx.moveTo(padL,padT+gH); ctx.lineTo(padL+gW+14,padT+gH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(padL+gW+14,padT+gH-5); ctx.lineTo(padL+gW+22,padT+gH); ctx.lineTo(padL+gW+14,padT+gH+5); ctx.fillStyle='#374151'; ctx.fill();
  // Axe Y (irradiance) avec flèche
  ctx.strokeStyle='#374151'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(padL,padT+gH); ctx.lineTo(padL,padT-8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(padL-5,padT-8); ctx.lineTo(padL,padT-16); ctx.lineTo(padL+5,padT-8); ctx.fillStyle='#374151'; ctx.fill();

  // Étiquettes axe X
  ctx.fillStyle='#374151'; ctx.font='11px sans-serif'; ctx.textAlign='center';
  [400,500,600,700,800,900,1000,1100,1200].forEach(l=>{
    const x=padL+(l-lMin)/(lMax-lMin)*gW;
    ctx.fillText(l,x,padT+gH+16);
    ctx.beginPath(); ctx.moveTo(x,padT+gH); ctx.lineTo(x,padT+gH+4); ctx.stroke();
  });
  ctx.fillText('λ (nm)',padL+gW/2,padT+gH+35);

  // Graduations axe Y avec valeurs numériques
  ctx.textAlign='right';
  const yTickVals=[0,200,400,600,800,1000];
  yTickVals.forEach(v=>{
    const y=padT+gH-v/1200*gH;
    ctx.beginPath(); ctx.strokeStyle='#374151'; ctx.moveTo(padL,y); ctx.lineTo(padL-5,y); ctx.stroke();
    ctx.fillStyle='#374151'; ctx.font='11px sans-serif';
    ctx.fillText(v,padL-8,y+4);
  });

  // Axe Y label
  ctx.save(); ctx.translate(12,padT+gH/2); ctx.rotate(-Math.PI/2);
  ctx.textAlign='center'; ctx.fillStyle='#374151'; ctx.font='11px sans-serif';
  ctx.fillText('Irradiance solaire (W·m⁻²·nm⁻¹)',0,0); ctx.restore();

  // Légende
  ctx.fillStyle=mat.color+'cc'; ctx.fillRect(padL+10,padT+8,14,14);
  ctx.fillStyle='#374151'; ctx.font='11px sans-serif'; ctx.textAlign='left';
  ctx.fillText(`Zone absorbée par ${mat.name}`,padL+30,padT+19);
  ctx.fillStyle='#F59E0B'; ctx.fillRect(padL+10,padT+28,14,4);
  ctx.fillStyle='#374151'; ctx.fillText('Spectre solaire (approximé)',padL+30,padT+35);
}

/* ══════════════════════════════════════════════
   GRAPHE Ec(ν) INTERACTIF — SLIDE 3
══════════════════════════════════════════════ */

// Constantes du graphe (coordonnées canvas)
const S3 = {
  padL: 80, padR: 40, padT: 45, padB: 55,
  nuMin: 0,           // × 10¹⁴ Hz affiché
  nuMax: 18,          // × 10¹⁴ Hz
  EcMin: -2,          // eV (partie sous l'axe = W prolongé)
  EcMax: 7,           // eV
  h: 6.626e-34,
  eV: 1.602e-19,
};

let s3Mouse = null;   // {x, y} en coordonnées canvas, ou null

function s3CanvasCoords(canvas){
  const W = canvas.width, H = canvas.height;
  const gW = W - S3.padL - S3.padR;
  const gH = H - S3.padT - S3.padB;
  return { W, H, gW, gH };
}

// ν (×10¹⁴ Hz) → pixel x
function s3NuToPx(nu, padL, gW){
  return padL + (nu - S3.nuMin) / (S3.nuMax - S3.nuMin) * gW;
}
// Ec (eV) → pixel y
function s3EcToPx(Ec, padT, gH){
  return padT + (1 - (Ec - S3.EcMin) / (S3.EcMax - S3.EcMin)) * gH;
}
// pixel x → ν (×10¹⁴ Hz)
function s3PxToNu(px, padL, gW){
  return S3.nuMin + (px - padL) / gW * (S3.nuMax - S3.nuMin);
}

function drawGraph3(){
  const canvas = document.getElementById('s3-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const { W, H, gW, gH } = s3CanvasCoords(canvas);
  const { padL, padR, padT, padB } = S3;

  const metalKey = document.getElementById('s3-metal')?.value || 'zinc';
  const metal = METALS_PE[metalKey] || METALS_PE.zinc;
  const h = S3.h, eV = S3.eV;

  // ν₀ en ×10¹⁴ Hz
  const nu0 = metal.W * eV / h / 1e14;

  // Mettre à jour les badges
  const wBadge = document.getElementById('s3-W-badge');
  if(wBadge) wBadge.textContent = `W = ${metal.W} eV`;
  const nu0Badge = document.getElementById('s3-nu0-badge');
  if(nu0Badge) nu0Badge.textContent = `ν₀ = ${nu0.toFixed(2)} × 10¹⁴ Hz`;

  // ── Fond ──
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  // Zone ν < ν₀ (rouge pâle)
  const xNu0 = s3NuToPx(nu0, padL, gW);
  const yAxis0 = s3EcToPx(0, padT, gH);   // y de Ec=0
  ctx.fillStyle = 'rgba(254,226,226,0.55)';
  ctx.fillRect(padL, padT, Math.max(0, xNu0 - padL), gH);

  // Zone ν > ν₀ (vert pâle)
  ctx.fillStyle = 'rgba(220,252,231,0.55)';
  ctx.fillRect(Math.max(padL, xNu0), padT, W - padR - Math.max(padL, xNu0), gH);

  // Grille légère
  ctx.strokeStyle = '#e5e7eb'; ctx.lineWidth = 1; ctx.setLineDash([3,4]);
  for(let nu=2; nu<=S3.nuMax; nu+=2){
    const x = s3NuToPx(nu, padL, gW);
    ctx.beginPath(); ctx.moveTo(x, padT); ctx.lineTo(x, padT+gH); ctx.stroke();
  }
  for(let ec=S3.EcMin+1; ec<=S3.EcMax; ec++){
    const y = s3EcToPx(ec, padT, gH);
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL+gW, y); ctx.stroke();
  }
  ctx.setLineDash([]);

  // ── Axe Ec = 0 ──
  ctx.strokeStyle = '#9ca3af'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(padL, yAxis0); ctx.lineTo(padL+gW, yAxis0); ctx.stroke();

  // ── Droite Ec = hν − W (prolongée en pointillés sous l'axe) ──
  // Partie pointillée (ν < ν₀ où Ec < 0, prolongement fictif)
  ctx.strokeStyle = '#93c5fd'; ctx.lineWidth = 2; ctx.setLineDash([8,5]);
  ctx.beginPath();
  const nuStartDash = Math.max(S3.nuMin, 0);
  const nuEndDash = nu0;
  ctx.moveTo(s3NuToPx(nuStartDash, padL, gW), s3EcToPx((nuStartDash*1e14*h/eV) - metal.W, padT, gH));
  ctx.lineTo(s3NuToPx(nuEndDash, padL, gW),   s3EcToPx(0, padT, gH));
  ctx.stroke();
  ctx.setLineDash([]);

  // ── Segment Ec = 0 pour ν < ν₀ (même style que la courbe montante) ──
  ctx.strokeStyle = '#374151'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(s3NuToPx(S3.nuMin, padL, gW), yAxis0);
  ctx.lineTo(xNu0, yAxis0);
  ctx.stroke();
  ctx.lineCap = 'butt';

  // Partie pleine (ν ≥ ν₀)
  ctx.strokeStyle = '#1B4F8A'; ctx.lineWidth = 3;
  ctx.beginPath();
  const nuStart = nu0;
  const nuEnd = S3.nuMax;
  ctx.moveTo(s3NuToPx(nuStart, padL, gW), s3EcToPx(0, padT, gH));
  ctx.lineTo(s3NuToPx(nuEnd, padL, gW),   s3EcToPx((nuEnd*1e14*h/eV) - metal.W, padT, gH));
  ctx.stroke();

  // ── W sur l'axe vertical (intercept à ν=0) ──
  const yW = s3EcToPx(-metal.W, padT, gH);
  // Accolade W
  ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(padL-28, yW); ctx.lineTo(padL-28, yAxis0); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(padL-34, yW+5);    ctx.lineTo(padL-28, yW);    ctx.lineTo(padL-22, yW+5);
  ctx.moveTo(padL-34, yAxis0-5); ctx.lineTo(padL-28, yAxis0); ctx.lineTo(padL-22, yAxis0-5);
  ctx.stroke();
  ctx.fillStyle = '#ef4444'; ctx.font = 'bold 13px Georgia,serif'; ctx.textAlign = 'center';
  ctx.fillText('W', padL-44, (yW+yAxis0)/2 + 5);


  // ── ν₀ sur l'axe des abscisses ──
  ctx.strokeStyle = '#D97706'; ctx.lineWidth = 1.5; ctx.setLineDash([6,3]);
  ctx.beginPath(); ctx.moveTo(xNu0, padT); ctx.lineTo(xNu0, padT+gH); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#D97706'; ctx.font = 'bold 13px Georgia,serif'; ctx.textAlign = 'center';
  ctx.fillText('ν₀', xNu0, padT+gH+18);
  // Point ν₀ sur la droite
  ctx.fillStyle = '#D97706'; ctx.strokeStyle = '#92400e'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(xNu0, yAxis0, 7, 0, Math.PI*2); ctx.fill(); ctx.stroke();

  // ── Label pente = h ──
  const xMid = s3NuToPx((nu0 + S3.nuMax)/2, padL, gW);
  const yMid = s3EcToPx(((nu0+S3.nuMax)/2*1e14*h/eV - metal.W)/2, padT, gH);
  ctx.fillStyle = 'rgba(255,255,255,0.92)'; ctx.strokeStyle = '#1B4F8A'; ctx.lineWidth = 1.5;
  const boxW=130, boxH=28;
  ctx.beginPath(); ctx.roundRect(xMid-boxW/2, yMid-boxH/2, boxW, boxH, 6); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#1B4F8A'; ctx.font = 'bold 13px Georgia,serif'; ctx.textAlign = 'center';
  ctx.fillText('pente = h', xMid, yMid+5);

  // ── Axes principaux ──
  ctx.strokeStyle = '#374151'; ctx.lineWidth = 2;
  // Axe ν
  ctx.beginPath(); ctx.moveTo(padL, padT+gH); ctx.lineTo(padL+gW+10, padT+gH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(padL+gW+10, padT+gH-5); ctx.lineTo(padL+gW+18, padT+gH); ctx.lineTo(padL+gW+10, padT+gH+5); ctx.fill();
  // Axe Ec
  ctx.beginPath(); ctx.moveTo(padL, padT+gH); ctx.lineTo(padL, padT-10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(padL-5, padT-10); ctx.lineTo(padL, padT-18); ctx.lineTo(padL+5, padT-10); ctx.fill();

  // Labels axes
  ctx.fillStyle = '#374151'; ctx.font = 'italic 14px Georgia,serif'; ctx.textAlign = 'left';
  ctx.fillText('ν (×10¹⁴ Hz)', padL+gW+22, padT+gH+5);
  ctx.save(); ctx.translate(padL-55, padT-14); ctx.rotate(-Math.PI/2);
  ctx.textAlign = 'center'; ctx.fillText('Ec (eV)', 0, 0); ctx.restore();

  // Graduations axe ν
  ctx.fillStyle = '#374151'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  for(let nu=2; nu<=S3.nuMax; nu+=2){
    const x = s3NuToPx(nu, padL, gW);
    ctx.beginPath(); ctx.moveTo(x, padT+gH); ctx.lineTo(x, padT+gH+5); ctx.stroke();
    ctx.fillText(nu, x, padT+gH+17);
  }
  // Graduations axe Ec
  ctx.textAlign = 'right';
  for(let ec=S3.EcMin+1; ec<=S3.EcMax; ec++){
    if(ec === 0) continue;
    const y = s3EcToPx(ec, padT, gH);
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL-5, y); ctx.stroke();
    ctx.fillText(ec, padL-8, y+4);
  }
  ctx.fillText('0', padL-8, yAxis0+4);

  // Labels zones
  ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillStyle = '#B91C1C';
  ctx.fillText("Pas d\u2019effet", Math.min(xNu0-10, padL + (xNu0-padL)/2), padT+30);
  ctx.fillText('photoélectrique', Math.min(xNu0-10, padL + (xNu0-padL)/2), padT+46);
  ctx.fillStyle = '#166534';
  ctx.fillText('Effet photoélectrique', padL + (xNu0-padL) + (padL+gW - xNu0)/2, padT+30);

  // ── CURSEUR SOURIS ──
  if(s3Mouse){
    const nu = s3PxToNu(s3Mouse.x, padL, gW);
    if(nu >= S3.nuMin && nu <= S3.nuMax && s3Mouse.x >= padL && s3Mouse.x <= padL+gW
       && s3Mouse.y >= padT && s3Mouse.y <= padT+gH){

      const Ec = nu*1e14*h/eV - metal.W;
      const isEjection = nu >= nu0;
      const xCur = s3NuToPx(nu, padL, gW);
      const yCur = isEjection ? s3EcToPx(Ec, padT, gH) : yAxis0;

      // Ligne verticale de survol
      ctx.strokeStyle = isEjection ? 'rgba(22,101,52,0.5)' : 'rgba(185,28,28,0.4)';
      ctx.lineWidth = 1.5; ctx.setLineDash([4,4]);
      ctx.beginPath(); ctx.moveTo(xCur, padT); ctx.lineTo(xCur, padT+gH); ctx.stroke();
      // Ligne horizontale vers l'axe Ec
      if(isEjection){
        ctx.beginPath(); ctx.moveTo(padL, yCur); ctx.lineTo(xCur, yCur); ctx.stroke();
      }
      ctx.setLineDash([]);

      // Projection sur axe ν (tiret bas)
      ctx.fillStyle = '#374151';
      ctx.beginPath(); ctx.arc(xCur, padT+gH, 4, 0, Math.PI*2); ctx.fill();
      // Projection sur axe Ec
      if(isEjection){
        ctx.fillStyle = '#166534';
        ctx.beginPath(); ctx.arc(padL, yCur, 4, 0, Math.PI*2); ctx.fill();
      }

      // Point sur la droite
      ctx.fillStyle = isEjection ? '#1B4F8A' : '#9ca3af';
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(xCur, yCur, 8, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 7px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(isEjection ? 'e⁻' : '✗', xCur, yCur+2.5);

      // Bulle tooltip sur le point
      const tip = isEjection
        ? `ν = ${nu.toFixed(2)} ×10¹⁴ Hz   |   Ec = h·ν − W = ${Ec.toFixed(3)} eV`
        : `ν = ${nu.toFixed(2)} ×10¹⁴ Hz   |   ν < ν₀ → Ec = 0 (aucun effet)`;
      ctx.font = 'bold 11px sans-serif'; // définir avant measureText
      const tipW = ctx.measureText(tip).width + 40;
      let tx = xCur - tipW/2;
      tx = Math.max(padL+4, Math.min(padL+gW-tipW-4, tx));
      const ty = yCur > padT+80 ? yCur - 48 : yCur + 16;

      ctx.fillStyle = isEjection ? 'rgba(240,253,244,0.97)' : 'rgba(255,241,242,0.97)';
      ctx.strokeStyle = isEjection ? '#16a34a' : '#ef4444'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.roundRect(tx, ty, tipW, 30, 6); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#111827'; ctx.textAlign = 'left';
      ctx.fillText(tip, tx+14, ty+19);

      // Mettre à jour la div tooltip sous le graphe
      const tooltipDiv = document.getElementById('s3-tooltip');
      if(tooltipDiv){
        tooltipDiv.style.display = 'block';
        if(isEjection){
          tooltipDiv.innerHTML =
            `<b>ν = ${nu.toFixed(3)} × 10¹⁴ Hz</b> &nbsp;|&nbsp; ν > ν₀ → <b style="color:#86efac">Effet photoélectrique</b><br>` +
            `Ec = hν − W = <b>${(nu*1e14*h/eV).toFixed(3)} − ${metal.W}</b> = <b style="color:#6ee7b7">${Ec.toFixed(3)} eV</b>` +
            `&nbsp;&nbsp;|&nbsp;&nbsp;λ ≈ <b>${Math.round(3e8/(nu*1e14)*1e9)} nm</b>`;
        } else {
          tooltipDiv.innerHTML =
            `<b>ν = ${nu.toFixed(3)} × 10¹⁴ Hz</b> &nbsp;|&nbsp; ν < ν₀ = ${nu0.toFixed(2)} × 10¹⁴ Hz<br>` +
            `<span style="color:#fca5a5">hν = ${(nu*1e14*h/eV).toFixed(3)} eV &lt; W = ${metal.W} eV → <b>aucun effet photoélectrique</b></span>`;
        }
      }
    }
  } else {
    const tooltipDiv = document.getElementById('s3-tooltip');
    if(tooltipDiv) tooltipDiv.style.display = 'none';
  }

  // Encadré formule Einstein (si pas de survol, sinon gêne)
  if(!s3Mouse){
    const fX = padL+gW-170, fY = padT+gH-80;
    ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.strokeStyle = '#e5e7eb'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.roundRect(fX, fY, 165, 60, 8); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#374151'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText("Relation d\u2019Einstein (1905)", fX+82, fY+18);
    ctx.fillStyle = '#1B4F8A'; ctx.font = 'bold 15px Georgia,serif';
    ctx.fillText('Ec = h·ν − W', fX+82, fY+44);
  }
}

function s3MouseMove(event){
  const canvas = document.getElementById('s3-canvas');
  if(!canvas) return;
  const rect = canvas.getBoundingClientRect();
  // Convertir les coordonnées CSS en coordonnées canvas (ratio devicePixelRatio)
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  s3Mouse = {
    x: (event.clientX - rect.left) * scaleX,
    y: (event.clientY - rect.top)  * scaleY,
  };
  drawGraph3();
}

function s3MouseLeave(){
  s3Mouse = null;
  drawGraph3();
}

/* ══════════════════════════════════════════════
   NAV + SLIDES
══════════════════════════════════════════════ */
function buildNav(){
  const nav = document.getElementById('nav');
  SLIDES.forEach((s,i)=>{
    const b = document.createElement('button');
    b.className = 'nav-btn' + (i===0?' active':'');
    b.id = 'nb'+i;
    b.textContent = s.icon+' '+s.label;
    b.onclick = ()=>goSlide(i);
    nav.appendChild(b);
  });
}

function buildSlides(){
  const c = document.getElementById('slides-container');
  SLIDES.forEach((s,i)=>{
    const d = document.createElement('div');
    d.className = 'slide' + (i===0?' active':'');
    d.id = 'sl'+i;
    c.appendChild(d);
  });
  const nav = document.createElement('div');
  nav.className = 'bottom-nav';
  nav.innerHTML = `
    <button class="arrow-btn" onclick="prevSlide()">← Précédent</button>
    <span class="slide-counter" id="sc">1 / ${SLIDES.length}</span>
    <button class="arrow-btn" onclick="nextSlide()">Suivant →</button>
  `;
  c.appendChild(nav);
}

function toggleS2(){
  s2Paused=!s2Paused;
  const btn=document.getElementById('btn-s2-pause');
  if(btn) btn.textContent=s2Paused?'▶ Reprendre':'⏸ Pause';
}

function stopAllAnims(){
  if(photonAnimId){ cancelAnimationFrame(photonAnimId); photonAnimId=null; }
  if(ejectionAnimId){ cancelAnimationFrame(ejectionAnimId); ejectionAnimId=null; }
  s2Photons=[]; s2Anchors=[]; s2PhotonTimer=0; s2Paused=false;
}

function renderCurrentSlide(){
  const s   = SLIDES[currentSlide];
  const div = document.getElementById('sl'+currentSlide);
  const step = stepStates[currentSlide] || 0;

  stopAllAnims();

  if(s.isQuiz){
    div.innerHTML = s.render();
    renderQuiz();
    return;
  }
  if(s.steps){
    div.innerHTML = s.renderStep(step);
    const bar = document.createElement('div');
    bar.className = 'steps-bar';
    s.steps.forEach((label,i)=>{
      const b = document.createElement('button');
      b.className = 'step-btn'+(i===step?' active':'');
      b.textContent = label;
      b.onclick = ()=>{ stepStates[currentSlide]=i; renderCurrentSlide(); };
      bar.appendChild(b);
    });
    div.appendChild(bar);
    if(s.afterRender) s.afterRender();
    return;
  }
  div.innerHTML = s.render();
  if(s.afterRender) requestAnimationFrame(()=>{ requestAnimationFrame(()=>s.afterRender()); });
}

function goSlide(i){
  document.getElementById('sl'+currentSlide).classList.remove('active');
  document.getElementById('nb'+currentSlide).classList.remove('active');
  currentSlide = i;
  document.getElementById('sl'+i).classList.add('active');
  document.getElementById('nb'+i).classList.add('active');
  document.getElementById('sc').textContent = (i+1)+' / '+SLIDES.length;
  renderCurrentSlide();
  window.scrollTo({top:0, behavior:'smooth'});
}
function nextSlide(){ if(currentSlide<SLIDES.length-1) goSlide(currentSlide+1); }
function prevSlide(){ if(currentSlide>0) goSlide(currentSlide-1); }

/* ══════════════════════════════════════════════
   QUIZ
══════════════════════════════════════════════ */
function renderQuiz(){
  const root = document.getElementById('quiz-root');
  if(!root) return;
  const qs = quizState;
  if(qs.current >= QUIZ.length){
    root.innerHTML = `
      <div class="info-box vert" style="font-size:1.1rem;text-align:center;padding:1.5rem">
        🎉 Quiz terminé ! Score : <b>${qs.score} / ${QUIZ.length}</b>
      </div>
      <div class="quiz-nav"><button onclick="resetQuiz()">Recommencer</button></div>
    `;
    return;
  }
  const q = QUIZ[qs.current];
  root.innerHTML = `
    <div style="font-size:.8rem;color:var(--gris-cl);margin-bottom:.75rem;font-family:var(--sans)">
      Question ${qs.current+1} / ${QUIZ.length} &nbsp;|&nbsp; Score : ${qs.score}/${QUIZ.length}
    </div>
    <div class="quiz-q">${q.q}</div>
    <div class="quiz-choices" id="qc"></div>
    ${qs.answered?`<div class="info-box ${qs.chosen===q.correct?'vert':'rouge'}" style="margin-top:.5rem">
      <b>${qs.chosen===q.correct?'✓ Correct !':'✗ Incorrect.'}</b> ${q.expl}
    </div>
    <div class="quiz-nav"><button onclick="nextQ()">Question suivante →</button></div>`:''}
  `;
  const qc = document.getElementById('qc');
  q.choices.forEach((c,i)=>{
    const b = document.createElement('button');
    b.className = 'quiz-choice';
    b.textContent = ['A','B','C','D'][i]+') '+c;
    if(qs.answered){
      b.disabled = true;
      if(i===q.correct)  b.classList.add('correct');
      if(i===qs.chosen && i!==q.correct) b.classList.add('wrong');
    } else {
      b.onclick = ()=>answerQ(i);
    }
    qc.appendChild(b);
  });
}
function answerQ(i){
  if(quizState.answered) return;
  quizState.answered = true;
  quizState.chosen = i;
  if(i===QUIZ[quizState.current].correct) quizState.score++;
  renderQuiz();
}
function nextQ(){ quizState.current++; quizState.answered=false; quizState.chosen=-1; renderQuiz(); }
function resetQuiz(){ quizState={current:0,answered:false,chosen:-1,score:0}; renderQuiz(); }

  const ids = ['f1887','f1905','f1954','f2024'];

    if(!el) return;
    if(i === id){
