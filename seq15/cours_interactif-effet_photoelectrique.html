<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Effet photoélectrique &amp; Jonction PN — Terminale spécialité</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap');

  :root {
    --bleu:    #1B4F8A;
    --bleu-cl: #4A90D9;
    --bleu-bg: #EAF3FB;
    --orange:  #D97706;
    --orange-cl:#F59E0B;
    --orange-bg:#FEF3C7;
    --rouge:   #B91C1C;
    --rouge-cl:#EF4444;
    --rouge-bg:#FEE2E2;
    --vert:    #166534;
    --vert-cl: #22C55E;
    --vert-bg: #DCFCE7;
    --gris:    #374151;
    --gris-cl: #9CA3AF;
    --gris-bg: #F3F4F6;
    --fond:    #FAFAF8;
    --blanc:   #FFFFFF;
    --txt:     #1C1917;
    --lora:    'Lora', Georgia, serif;
    --sans:    'Source Sans 3', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--fond);
    color: var(--txt);
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    background: linear-gradient(135deg, #0F2847 0%, #1B4F8A 60%, #1e5f9e 100%);
    color: #fff;
    padding: 2rem 2rem 1.6rem;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content:'';
    position:absolute;inset:0;
    background: repeating-linear-gradient(45deg, rgba(255,255,255,.03) 0, rgba(255,255,255,.03) 1px, transparent 1px, transparent 20px);
  }
  header .inner { position:relative; max-width:960px; margin:0 auto; }
  header .badge {
    display:inline-block;
    font-family: var(--sans);
    font-size:.72rem; font-weight:600; letter-spacing:.12em; text-transform:uppercase;
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25);
    border-radius:20px; padding:.25rem .9rem; margin-bottom:.9rem; color:#B5D4F4;
  }
  header h1 {
    font-family: var(--lora);
    font-size: clamp(1.5rem, 3vw, 2.2rem);
    font-weight:700; line-height:1.25;
    margin-bottom:.5rem;
  }
  header p {
    font-size:.95rem; color:rgba(255,255,255,.72); max-width:620px; line-height:1.6;
  }

  .nav-wrap {
    background: var(--blanc);
    border-bottom: 2px solid #E5E7EB;
    position: sticky; top:0; z-index:100;
    box-shadow: 0 2px 8px rgba(0,0,0,.07);
  }
  .nav-inner {
    max-width:960px; margin:0 auto;
    display:flex; align-items:center; gap:0;
    overflow-x:auto; scrollbar-width:none;
    padding: 0 1rem;
  }
  .nav-inner::-webkit-scrollbar { display:none; }
  .nav-btn {
    flex-shrink:0;
    font-family: var(--sans); font-size:.8rem; font-weight:600;
    padding:.75rem 1rem;
    background:none; border:none; border-bottom: 3px solid transparent;
    color: var(--gris-cl); cursor:pointer;
    transition: color .2s, border-color .2s;
    white-space:nowrap;
  }
  .nav-btn.active { color: var(--bleu); border-bottom-color: var(--bleu); }
  .nav-btn:hover:not(.active) { color: var(--gris); }

  .content { max-width:960px; margin:0 auto; padding: 2rem 1.5rem 4rem; }
  .slide { display:none; animation: fadeUp .35s ease; }
  .slide.active { display:block; }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(12px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .slide-title {
    font-family: var(--lora);
    font-size:1.5rem; font-weight:700;
    color: var(--bleu); margin-bottom:1.5rem;
    padding-bottom:.6rem;
    border-bottom: 2px solid var(--bleu-bg);
    display:flex; align-items:center; gap:.6rem;
  }
  .slide-title .num {
    width:32px; height:32px; border-radius:50%;
    background: var(--bleu); color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-family: var(--sans); font-size:.85rem; font-weight:700; flex-shrink:0;
  }

  .info-box {
    border-radius:10px; padding:1rem 1.2rem;
    font-size:.9rem; line-height:1.7;
    margin: 1rem 0;
  }
  .info-box.bleu  { background:var(--bleu-bg);   border-left:4px solid var(--bleu-cl);  color:#1e3a5f; }
  .info-box.orange{ background:var(--orange-bg);  border-left:4px solid var(--orange-cl);color:#78350F; }
  .info-box.rouge { background:var(--rouge-bg);   border-left:4px solid var(--rouge-cl); color:#7F1D1D; }
  .info-box.vert  { background:var(--vert-bg);    border-left:4px solid var(--vert-cl);  color:#14532D; }
  .info-box.gris  { background:var(--gris-bg);    border-left:4px solid var(--gris-cl);  color:#374151; }
  .info-box b { font-weight:700; }
  .formula-box {
    background: linear-gradient(135deg, #0F2847, #1B4F8A);
    color:#fff; border-radius:12px;
    padding:1.1rem 1.5rem; margin:1rem 0;
    font-family: var(--lora); font-size:1.15rem;
    text-align:center; letter-spacing:.03em;
  }

  .steps-bar { display:flex; flex-wrap:wrap; gap:.5rem; margin:1rem 0; }
  .step-btn {
    font-family:var(--sans); font-size:.8rem; font-weight:600;
    padding:.4rem .9rem; border-radius:20px;
    border:1.5px solid #D1D5DB;
    background:#fff; color:var(--gris-cl);
    cursor:pointer; transition:all .2s;
  }
  .step-btn.active {
    background:var(--bleu); border-color:var(--bleu);
    color:#fff; box-shadow:0 2px 8px rgba(27,79,138,.3);
  }

  .bottom-nav {
    display:flex; justify-content:space-between; align-items:center;
    margin-top:2rem; padding-top:1.5rem;
    border-top:1px solid #E5E7EB;
  }
  .arrow-btn {
    font-family:var(--sans); font-size:.85rem; font-weight:600;
    padding:.55rem 1.4rem; border-radius:8px;
    border:1.5px solid #D1D5DB;
    background:#fff; color:var(--gris); cursor:pointer;
    transition:all .2s;
  }
  .arrow-btn:hover { background:var(--bleu); color:#fff; border-color:var(--bleu); }
  .slide-counter { font-size:.8rem; color:var(--gris-cl); font-family:var(--sans); }

  svg { width:100%; height:auto; display:block; }
  .svg-wrap { margin:1rem 0; border-radius:12px; overflow:hidden; background:#fff; border:1px solid #E5E7EB; padding:1rem; }

  .quiz-q { font-family:var(--lora); font-size:1rem; font-weight:600; line-height:1.6; margin-bottom:1rem; color:var(--txt); }
  .quiz-choices { display:flex; flex-direction:column; gap:.5rem; margin-bottom:1rem; }
  .quiz-choice {
    font-family:var(--sans); font-size:.9rem;
    padding:.7rem 1rem; border-radius:8px;
    border:1.5px solid #E5E7EB; background:#fff;
    cursor:pointer; text-align:left;
    transition:all .2s;
  }
  .quiz-choice:hover:not(:disabled) { border-color:var(--bleu-cl); background:var(--bleu-bg); }
  .quiz-choice.correct  { background:var(--vert-bg);  border-color:var(--vert-cl);  color:var(--vert); }
  .quiz-choice.wrong    { background:var(--rouge-bg); border-color:var(--rouge-cl); color:var(--rouge); }
  .quiz-nav { display:flex; gap:.75rem; flex-wrap:wrap; margin-top:.75rem; }
  .quiz-nav button {
    font-family:var(--sans); font-size:.82rem; font-weight:600;
    padding:.45rem 1.1rem; border-radius:8px;
    border:1.5px solid var(--bleu); background:var(--bleu); color:#fff;
    cursor:pointer; transition:all .2s;
  }

  .chain {
    display:flex; flex-wrap:wrap; gap:.6rem;
    align-items:center; margin:1.2rem 0;
  }
  .chain-box {
    flex:1; min-width:130px;
    background:#fff; border:1.5px solid #E5E7EB;
    border-radius:10px; padding:.8rem .9rem;
    text-align:center;
  }
  .chain-box .cb-num { font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--gris-cl); margin-bottom:.3rem; }
  .chain-box .cb-icon { font-size:1.6rem; margin:.1rem 0; }
  .chain-box .cb-label { font-family:var(--lora); font-size:.85rem; font-weight:600; color:var(--txt); }
  .chain-box .cb-sub { font-size:.75rem; color:var(--gris-cl); margin-top:.2rem; }
  .chain-arrow { color:var(--gris-cl); font-size:1.3rem; flex-shrink:0; }

  .formulas-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:1rem; margin:1.2rem 0; }
  .formula-card {
    background:#fff; border:1.5px solid #E5E7EB; border-radius:10px;
    padding:1rem; text-align:center;
  }
  .formula-card h4 { font-family:var(--lora); font-size:.85rem; color:var(--gris-cl); margin-bottom:.5rem; }
  .formula-card .eq { font-family:var(--lora); font-size:1.2rem; font-weight:700; color:var(--bleu); margin-bottom:.35rem; }
  .formula-card small { font-size:.78rem; color:var(--gris-cl); line-height:1.5; display:block; }

  /* ── PHOTO INTRO ── */
  .photo-hero {
    position:relative; border-radius:16px; overflow:hidden;
    margin:0 0 1.2rem;
    box-shadow:0 8px 32px rgba(0,0,0,.18);
    background: #0a1628;
    height: 260px;
  }
  .photo-hero canvas { display:block; width:100%; height:100%; }
  .photo-hero .photo-label {
    position:absolute; bottom:.8rem; left:1rem;
    background:rgba(0,0,0,.55); backdrop-filter:blur(4px);
    color:#fff; font-size:.78rem; border-radius:8px;
    padding:.3rem .75rem; font-family:var(--sans);
  }

  /* ── ANIMATION PHOTONS ── */
  .anim-wrap {
    border-radius:14px; overflow:hidden;
    background:#0d1b2a;
    border:2px solid #1B4F8A;
    margin:1rem 0;
    position:relative;
  }
  .anim-wrap canvas { display:block; width:100%; }
  .anim-controls {
    display:flex; align-items:center; gap:1rem;
    background:#f8fafc; border-top:1px solid #E5E7EB;
    padding:.75rem 1rem; flex-wrap:wrap;
  }
  .anim-controls label { font-size:.82rem; font-weight:600; color:var(--gris); font-family:var(--sans); }
  .anim-controls input[type=range] {
    flex:1; min-width:120px; accent-color: var(--bleu);
  }
  .anim-controls select {
    font-family:var(--sans); font-size:.82rem;
    border:1.5px solid #D1D5DB; border-radius:8px;
    padding:.3rem .6rem; background:#fff; color:var(--gris);
    cursor:pointer;
  }
  .anim-controls .val-badge {
    font-family:var(--lora); font-size:.9rem; font-weight:700;
    color:var(--bleu); min-width:80px; text-align:right;
  }
  .anim-controls button {
    font-family:var(--sans); font-size:.8rem; font-weight:600;
    padding:.35rem .9rem; border-radius:8px;
    border:1.5px solid var(--bleu); background:var(--bleu); color:#fff;
    cursor:pointer;
  }

  /* ── CURSEUR ÉJECTION ── */
  .ejection-wrap {
    border-radius:14px; overflow:hidden;
    border:2px solid #E5E7EB;
    background:#fff;
    margin:1rem 0;
  }
  .ejection-wrap canvas { display:block; width:100%; }
  .ejection-controls {
    display:flex; flex-direction:column; gap:.75rem;
    background:#f8fafc; border-top:1px solid #E5E7EB;
    padding:1rem 1.2rem;
  }
  .ejection-controls .ctrl-row {
    display:flex; align-items:center; gap:1rem; flex-wrap:wrap;
  }
  .ejection-controls label { font-size:.82rem; font-weight:600; color:var(--gris); font-family:var(--sans); min-width:120px; }
  .ejection-controls input[type=range] { flex:1; min-width:140px; accent-color:var(--orange); }
  .ejection-controls select {
    font-family:var(--sans); font-size:.82rem;
    border:1.5px solid #D1D5DB; border-radius:8px;
    padding:.35rem .7rem; background:#fff; color:var(--gris); cursor:pointer;
  }
  .status-badge {
    display:inline-flex; align-items:center; gap:.4rem;
    padding:.35rem .9rem; border-radius:20px;
    font-family:var(--sans); font-size:.82rem; font-weight:700;
    transition:all .3s;
  }
  .status-badge.non { background:#FEE2E2; color:#B91C1C; border:1.5px solid #FCA5A5; }
  .status-badge.oui { background:#DCFCE7; color:#166534; border:1.5px solid #86EFAC; }

  /* ── MATÉRIAUX PV ── */
  .mat-grid {
    display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:.75rem;
    margin:1rem 0;
  }
  .mat-card {
    border-radius:12px; padding:1rem; border:2px solid #E5E7EB;
    background:#fff; cursor:pointer; transition:all .2s;
    text-align:center;
  }
  .mat-card:hover { border-color:var(--bleu-cl); transform:translateY(-2px); box-shadow:0 4px 12px rgba(27,79,138,.12); }
  .mat-card.selected { border-color:var(--bleu); background:var(--bleu-bg); }
  .mat-card .mat-icon { font-size:2rem; margin-bottom:.4rem; }
  .mat-card .mat-name { font-family:var(--lora); font-size:.9rem; font-weight:700; color:var(--txt); margin-bottom:.2rem; }
  .mat-card .mat-eg { font-size:.78rem; color:var(--bleu); font-weight:600; }
  .mat-card .mat-eff { font-size:.75rem; color:var(--gris-cl); margin-top:.2rem; }

  @media(max-width:600px) {
    header { padding:1.4rem 1rem 1.2rem; }
    .content { padding:1.5rem 1rem 3rem; }
    .slide-title { font-size:1.2rem; }
    .chain-arrow { display:none; }
    .photo-hero { height:180px; }
  }
</style>
</head>
<body>

<header>
  <div class="inner">
    <div class="badge">Terminale spécialité Physique-Chimie</div>
    <h1>Effet photoélectrique &amp; Jonction PN</h1>
    <p>Animation interactive — du photon au courant électrique — BO 2020</p>
  </div>
</header>

<nav class="nav-wrap" aria-label="Navigation entre les parties">
  <div class="nav-inner" id="nav"></div>
</nav>

<main class="content" id="slides-container"></main>

<script>
/* ══════════════════════════════════════════════
   DONNÉES MATÉRIAUX (effet PE et PV)
══════════════════════════════════════════════ */
const METALS_PE = {
  cesium:   { name:'Césium (Cs)',  W:2.0,  color:'#a78bfa', desc:'Métal alcalin très réactif, seuil dans le visible' },
  potassium:{ name:'Potassium (K)',W:2.3,  color:'#60a5fa', desc:'Métal alcalin, cellule photoélectrique classique' },
  sodium:   { name:'Sodium (Na)', W:2.36, color:'#fbbf24', desc:'Métal alcalin, seuil UV proche-visible' },
  zinc:     { name:'Zinc (Zn)',   W:4.33, color:'#6ee7b7', desc:'Métal de transition, expérience de Hertz (1887)' },
  aluminium:{ name:'Aluminium (Al)',W:4.28,color:'#d1d5db', desc:'Métal léger, très répandu, seuil UV' },
  cuivre:   { name:'Cuivre (Cu)', W:4.7,  color:'#fb923c', desc:'Métal conducteur, seuil UV profond' },
  argent:   { name:'Argent (Ag)', W:4.26, color:'#e5e7eb', desc:'Excellent conducteur, seuil UV' },
  platine:  { name:'Platine (Pt)', W:5.65, color:'#94a3b8', desc:'Métal noble, W parmi les plus élevés' },
};

const MATS_PV = [
  { id:'si-mono',  icon:'🔷', name:'Si monocristallin', Eg:1.12, eff:'22–26 %', lmax:1107, color:'#1B4F8A',
    desc:'Cellule standard haut de gamme. Silicium purifié à 99,9999 %, réseau cristallin parfait. Eg = 1,12 eV → λmax ≈ 1 107 nm (IR proche).' },
  { id:'si-poly',  icon:'🔵', name:'Si polycristallin', Eg:1.12, eff:'16–20 %', lmax:1107, color:'#3B82F6',
    desc:'Cellules bleutées classiques. Même Eg que le monocristallin mais rendement réduit par les joints de grains.' },
  { id:'gaas',     icon:'🟣', name:'GaAs (arséniure de gallium)', Eg:1.43, eff:'28–34 %', lmax:867, color:'#7c3aed',
    desc:'Semiconducteur III-V. Eg direct → excellent absorbeur. Utilisé dans les satellites et concentrateurs solaires. λmax ≈ 867 nm.' },
  { id:'cdte',     icon:'🟤', name:'CdTe (tellurure de cadmium)', Eg:1.44, eff:'18–22 %', lmax:861, color:'#92400e',
    desc:'Couche mince, faible coût. Eg ≈ 1,44 eV, proche de l\'optimum théorique Shockley-Queisser. λmax ≈ 861 nm.' },
  { id:'perov',    icon:'🟡', name:'Pérovskite (CH₃NH₃PbI₃)', Eg:1.55, eff:'25–33 %', lmax:800, color:'#b45309',
    desc:'Technologie émergente, Eg modulable (1,1–2,3 eV). Rendement en forte progression depuis 2012. λmax ≈ 800 nm.' },
  { id:'cigs',     icon:'🟠', name:'CIGS (Cu-In-Ga-Se)', Eg:1.15, eff:'20–23 %', lmax:1078, color:'#ea580c',
    desc:'Couche mince flexible. Eg ajustable de 1,05 à 1,67 eV selon rapport In/Ga. Bonne absorption, faible quantité de matière.' },
];

/* ══════════════════════════════════════════════
   SLIDES
══════════════════════════════════════════════ */
const SLIDES = [

  /* ── 1 ── Accroche visuelle : photo cellule PV + contexte historique */
  { label:'Accroche', icon:'☀️',
    render(){return `
      <div class="slide-title"><span class="num">1</span>Comment la lumière produit-elle un courant ?</div>

      <!-- Photo réaliste cellule PV -->
      <div class="photo-hero">
        <canvas id="photo-pv" width="960" height="260"></canvas>
        <div class="photo-label">📷 Cellule photovoltaïque Si monocristallin sous éclairage solaire — illustration simulée</div>
      </div>

      <!-- Accroche texte en 3 colonnes -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:.9rem;margin:1.2rem 0">
        <div class="info-box orange" style="margin:0">
          <b>🔬 L'énigme de 1887</b><br>
          Heinrich Hertz observe qu'une plaque de zinc exposée à de la lumière UV émet des particules chargées.
          L'intensité lumineuse ne change rien : seule la <em>couleur</em> (fréquence) compte. La physique classique est incapable d'expliquer ce fait.
        </div>
        <div class="info-box bleu" style="margin:0">
          <b>💡 La révolution d'Einstein (1905)</b><br>
          Einstein postule que la lumière est constituée de <b>grains d'énergie</b> — les <b>photons</b> — d'énergie E = hν.
          Un photon unique interagit avec un électron unique : si hν ≥ W, l'électron est arraché ; sinon, rien.
          Cette idée lui vaudra le prix Nobel de Physique en <b>1921</b>.
        </div>
        <div class="info-box vert" style="margin:0">
          <b>⚡ Vers le photovoltaïque (1954)</b><br>
          Le même mécanisme quantique, appliqué à un semi-conducteur (Si, GaAs…), propulse un électron
          dans la bande de conduction et génère un <b>courant électrique</b> : c'est l'<b>effet photovoltaïque</b>,
          utilisé dans tous les panneaux solaires.
        </div>
      </div>

      <!-- Frise chronologique interactive -->
      <div style="background:#fff;border:1.5px solid #E5E7EB;border-radius:12px;padding:1rem 1.2rem 0 1.2rem;margin:.5rem 0">
        <div style="font-family:var(--lora);font-size:.85rem;font-weight:700;color:var(--bleu);margin-bottom:1rem">📅 Repères chronologiques — cliquez sur une date</div>

        <!-- Frise SVG -->
        <div style="position:relative;overflow-x:auto;padding-bottom:.5rem">
          <svg id="frise-svg" viewBox="0 0 820 90" xmlns="http://www.w3.org/2000/svg" style="min-width:480px;width:100%;display:block">
            <defs>
              <marker id="frise-arrow" viewBox="0 0 14 14" refX="12" refY="7" markerWidth="10" markerHeight="10" orient="auto">
                <path d="M1 2 L12 7 L1 12 Z" fill="#1B4F8A"/>
              </marker>
            </defs>
            <!-- Flèche principale épaisse -->
            <line x1="40" y1="48" x2="780" y2="48" stroke="#1B4F8A" stroke-width="7" stroke-linecap="round" marker-end="url(#frise-arrow)"/>

            <!-- Date 1887 -->
            <line x1="140" y1="38" x2="140" y2="58" stroke="#92400E" stroke-width="2.5"/>
            <rect x="108" y="10" width="64" height="26" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5" style="cursor:pointer" onclick="toggleFrise('f1887')"/>
            <text x="140" y="28" text-anchor="middle" font-family="'Source Sans 3',sans-serif" font-size="13" font-weight="700" fill="#92400E" style="cursor:pointer;pointer-events:none">1887</text>

            <!-- Date 1905 -->
            <line x1="320" y1="38" x2="320" y2="58" stroke="#1e3a5f" stroke-width="2.5"/>
            <rect x="288" y="10" width="64" height="26" rx="8" fill="#DBEAFE" stroke="#4A90D9" stroke-width="1.5" style="cursor:pointer" onclick="toggleFrise('f1905')"/>
            <text x="320" y="28" text-anchor="middle" font-family="'Source Sans 3',sans-serif" font-size="13" font-weight="700" fill="#1e3a5f" style="cursor:pointer;pointer-events:none">1905</text>

            <!-- Date 1954 -->
            <line x1="540" y1="38" x2="540" y2="58" stroke="#14532D" stroke-width="2.5"/>
            <rect x="508" y="10" width="64" height="26" rx="8" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5" style="cursor:pointer" onclick="toggleFrise('f1954')"/>
            <text x="540" y="28" text-anchor="middle" font-family="'Source Sans 3',sans-serif" font-size="13" font-weight="700" fill="#14532D" style="cursor:pointer;pointer-events:none">1954</text>

            <!-- Date 2024 -->

        ⚡ <b>À retenir pour la suite :</b> ce champ permanent sera le <em>moteur de séparation</em> des paires électron–trou créées par les photons. C'est l'objet de la partie suivante.`
      ];
      return `
        <div class="slide-title"><span class="num">6</span>La jonction PN — construction</div>
        ${s===2
          ? `<div style="margin:1rem 0;border-radius:12px;overflow:hidden;border:1px solid #E5E7EB"><canvas id="depletionCanvas" width="840" height="320" style="width:100%;display:block"></canvas></div>`
          : `<div class="svg-wrap"><svg viewBox="0 0 840 ${s===3?360:340}" xmlns="http://www.w3.org/2000/svg">${svgs[s]}</svg></div>`
        }
        <div class="info-box ${['rouge','bleu','gris','orange'][s]}">${explications[s]}</div>
      `;
    },
    afterRender(){
      if((stepStates[5]||0) !== 2) return;
      const canvas = document.getElementById('depletionCanvas');
      if(!canvas) return;
      const ctx = canvas.getContext('2d');
      const W = 840, H = 320;

      // Layout (same proportions as step 3 SVG, scaled to 840x320)
      const pLeft=40, pRight=270, nLeft=490, nRight=720;
      const deplLeft=270, deplRight=490;
      const yTop=40, yBot=300;

      // --- Final state matching step 3 exactly ---
      // Mobile carriers in P: 3 cols × 4 rows at x=80,140,200 y=100,150,210,265
      const mobileP = [[80,100],[140,100],[200,100],[80,155],[140,155],[200,155],[80,210],[140,210],[200,210],[80,260],[140,260],[200,260]];
      // Mobile carriers in N: 3 cols × 4 rows at x=520,575,635 y=100,150,210,265
      const mobileN = [[520,100],[575,100],[635,100],[520,155],[575,155],[635,155],[520,210],[575,210],[635,210],[520,260],[575,260],[635,260]];
      // Fixed ions in depletion: B- at x=305 y=95,130,245,280 / P+ at x=465 same y
      const ionBfinal = [[305,95],[305,130],[305,245],[305,280]];
      const ionPfinal = [[465,95],[465,130],[465,245],[465,280]];

      // --- Animation state ---
      // Phase 1 (0-120f): porteurs des bords internes migrent vers le centre
      // 4 trous depuis P (colonnes internes vers deplLeft) et 4 e- depuis N
      const migP = [[200,100],[200,155],[200,210],[200,260]]; // trous qui migrent
      const migN = [[520,100],[520,155],[520,210],[520,260]]; // e- qui migrent
      // targets: trous vont vers ~305 (rencontrent e- venant de 465), se recombinent au centre ~385
      const recombX = 385;

      let frame = 0;
      const PHASE1 = 90, PHASE2 = 60; // frames
      let animId = null;

      function drawBackground(){
        // Zone P
        ctx.fillStyle='#FEF2F0'; ctx.strokeStyle='#DC6B49'; ctx.lineWidth=2.5;
        roundRect(ctx,pLeft,yTop,pRight-pLeft,yBot-yTop,10); ctx.fill(); ctx.stroke();
        // Zone déplétion
        ctx.fillStyle='#F5F5F5'; ctx.fillRect(deplLeft,yTop,deplRight-deplLeft,yBot-yTop);
        // Zone N
        ctx.fillStyle='#EAF3FB'; ctx.strokeStyle='#4A90D9'; ctx.lineWidth=2.5;
        roundRect(ctx,nLeft,yTop,nRight-nLeft,yBot-yTop,10); ctx.fill(); ctx.stroke();
        // Borders déplétion
        ctx.setLineDash([6,4]); ctx.strokeStyle='#9CA3AF'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.moveTo(deplLeft,yTop); ctx.lineTo(deplLeft,yBot); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(deplRight,yTop); ctx.lineTo(deplRight,yBot); ctx.stroke();
        ctx.setLineDash([]);
        // Labels
        ctx.font='bold 16px Georgia,serif';
        ctx.fillStyle='#9A3412'; ctx.textAlign='center'; ctx.fillText('P',155,70);
        ctx.fillStyle='#1B4F8A'; ctx.fillText('N',605,70);
        ctx.font='9px sans-serif'; ctx.fillStyle='#DC6B49'; ctx.fillText('trous mobiles',155,84);
        ctx.fillStyle='#4A90D9'; ctx.fillText('électrons mobiles',605,84);
        ctx.font='10px Georgia,serif'; ctx.fillStyle='#6B7280';
        ctx.fillText('Zone de déplétion',380,H-8);
      }

      function drawCarrier(x,y,type,alpha=1){
        ctx.globalAlpha=alpha;
        if(type==='trou'){
          ctx.beginPath(); ctx.arc(x,y,10,0,Math.PI*2);
          ctx.fillStyle='#FEF2F0'; ctx.strokeStyle='#DC6B49'; ctx.lineWidth=1.5;
          ctx.fill(); ctx.stroke();
          ctx.font='12px sans-serif'; ctx.fillStyle='#DC6B49'; ctx.textAlign='center';
          ctx.fillText('⊕',x,y+5);
        } else if(type==='electron'){
          ctx.beginPath(); ctx.arc(x,y,10,0,Math.PI*2);
          ctx.fillStyle='#EAF3FB'; ctx.strokeStyle='#4A90D9'; ctx.lineWidth=1.5;
          ctx.fill(); ctx.stroke();
          ctx.font='bold 9px sans-serif'; ctx.fillStyle='#1B4F8A'; ctx.textAlign='center';
          ctx.fillText('e⁻',x,y+4);
        } else if(type==='ionB'){
          ctx.beginPath(); ctx.arc(x,y,9,0,Math.PI*2);
          ctx.fillStyle='#EDE9FE'; ctx.strokeStyle='#7C3AED'; ctx.lineWidth=2;
          ctx.fill(); ctx.stroke();
          ctx.font='bold 13px Georgia,serif'; ctx.fillStyle='#5B21B6'; ctx.textAlign='center';
          ctx.fillText('−',x,y+5);
        } else if(type==='ionP'){
          ctx.fillStyle='#FEF3C7'; ctx.strokeStyle='#D97706'; ctx.lineWidth=2;
          ctx.beginPath(); roundRect(ctx,x-9,y-9,18,18,3); ctx.fill(); ctx.stroke();
          ctx.font='bold 13px Georgia,serif'; ctx.fillStyle='#92400E'; ctx.textAlign='center';
          ctx.fillText('+',x,y+6);
        }
        ctx.globalAlpha=1;
      }

      function roundRect(c,x,y,w,h,r){
        c.beginPath(); c.moveTo(x+r,y);
        c.lineTo(x+w-r,y); c.arcTo(x+w,y,x+w,y+r,r);
        c.lineTo(x+w,y+h-r); c.arcTo(x+w,y+h,x+w-r,y+h,r);
        c.lineTo(x+r,y+h); c.arcTo(x,y+h,x,y+h-r,r);
        c.lineTo(x,y+r); c.arcTo(x,y,x+r,y,r); c.closePath();
      }

      function draw(){
        ctx.clearRect(0,0,W,H);
        drawBackground();

        const t1 = Math.min(frame/PHASE1,1); // 0→1 pendant phase 1
        const t2 = frame>PHASE1 ? Math.min((frame-PHASE1)/PHASE2,1) : 0; // 0→1 pendant phase 2

        // Porteurs fixes en P (ceux qui ne migrent pas) - toujours visibles
        [[80,100],[140,100],[80,155],[140,155],[80,210],[140,210],[80,260],[140,260]].forEach(([x,y])=>drawCarrier(x,y,'trou'));
        // Porteurs fixes en N (ceux qui ne migrent pas)
        [[575,100],[635,100],[575,155],[635,155],[575,210],[635,210],[575,260],[635,260]].forEach(([x,y])=>drawCarrier(x,y,'electron'));

        // Porteurs qui migrent (colonne interne P : x=200, N : x=520)
        migP.forEach(([sx,y])=>{
          const tx = deplLeft + (recombX-deplLeft)*t1; // va vers centre
          const x = sx + (tx-sx)*t1;
          if(t2<1) drawCarrier(x,y,'trou', t2<0.5?1:1-t2*2); // disparaît en phase 2
        });
        migN.forEach(([sx,y])=>{
          const tx = deplRight - (deplRight-recombX)*t1;
          const x = sx + (tx-sx)*t1;
          if(t2<1) drawCarrier(x,y,'electron', t2<0.5?1:1-t2*2);
        });

        // Phase 2 : ions fixes apparaissent progressivement
        if(t2>0){
          ionBfinal.forEach(([x,y])=>drawCarrier(x,y,'ionB',Math.min(t2*2,1)));
          ionPfinal.forEach(([x,y])=>drawCarrier(x,y,'ionP',Math.min(t2*2,1)));
        }

        // Label "recombinaison" au centre pendant phase 1 fin / phase 2 début
        if(t1>0.7 && t2<0.5){
          ctx.globalAlpha = t1>0.9 ? (t2<0.3?1:1-t2/0.3) : (t1-0.7)/0.2;
          ctx.font='bold 11px sans-serif'; ctx.fillStyle='#374151'; ctx.textAlign='center';
          ctx.fillText('recombinaison',recombX,H/2-15);
          ctx.font='18px sans-serif'; ctx.fillText('💥',recombX,H/2+8);
          ctx.globalAlpha=1;
        }

        if(frame < PHASE1+PHASE2) {
          frame++;
          animId = requestAnimationFrame(draw);
        } else {
          // État final : identique au step 3
          ionBfinal.forEach(([x,y])=>drawCarrier(x,y,'ionB'));
          ionPfinal.forEach(([x,y])=>drawCarrier(x,y,'ionP'));
        }
      }

      if(animId) cancelAnimationFrame(animId);
      frame=0;
      draw();
    }
  },
